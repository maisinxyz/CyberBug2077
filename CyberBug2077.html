function drawLoadingCity3D(fly = 0.25, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;

  const t = frame * (0.0032 + fly * 0.0056);
  const horizon = H * (0.34 + 0.006 * Math.sin(t * 0.45));
  const centerX = W * 0.5 + Math.sin(t * 0.35) * W * 0.01;
  const speed = 0.2 + fly * 0.82;

  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#020611');
  sky.addColorStop(0.36, '#091a32');
  sky.addColorStop(1, '#0a0619');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Low-lying haze for depth.
  ctx.save();
  for (let i = 0; i < 4; i++) {
    const hy = horizon - 40 + i * 28;
    const haze = ctx.createLinearGradient(0, hy, 0, H);
    haze.addColorStop(0, `rgba(0,240,255,${0.02 + i * 0.012})`);
    haze.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = haze;
    ctx.fillRect(0, hy, W, H - hy);
  }
  ctx.restore();

  // Far megacity silhouette with denser structure and micro windows.
  ctx.save();
  for (let i = 0; i < 70; i++) {
    const sx = ((i * 60 - t * 22) % (W + 180)) - 90;
    const nh = 0.5 + 0.5 * Math.sin(i * 2.31 + 0.8);
    const bw = 26 + nh * 38;
    const bh = 80 + nh * 210;
    const by = horizon - bh + (i % 3) * 5;

    ctx.globalAlpha = 0.11;
    ctx.fillStyle = i % 2 ? '#101d38' : '#150d2e';
    ctx.fillRect(sx, by, bw, bh);

    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = i % 2 ? PAL.cyan : PAL.yellow;
    ctx.strokeRect(sx, by, bw, bh);

    ctx.globalAlpha = 0.08;
    ctx.fillStyle = (i % 2 ? '#9adfff' : '#ffd27a');
    for (let wy = by + 8; wy < by + bh - 6; wy += 10) {
      for (let wx = sx + 4; wx < sx + bw - 4; wx += 7) {
        if (((wx + wy + i) | 0) % 6 < 2) ctx.fillRect(wx, wy, 2, 2);
      }
    }
  }
  ctx.restore();

  // Mid skyline with rooftop equipment and stronger facades.
  ctx.save();
  for (let i = 0; i < 62; i++) {
    const sx = ((i * 69 - t * 24) % (W + 210)) - 105;
    const rw = 30 + (0.5 + 0.5 * Math.sin(i * 1.37 + 1.9)) * 55;
    const rh = 85 + (0.5 + 0.5 * Math.sin(i * 2.9 + 0.4)) * 185;
    const by = horizon - rh + (i % 4) * 5;
    const c1 = i % 2 ? '#111f3f' : '#1a1033';
    const c2 = i % 2 ? '#15294f' : '#271645';

    ctx.globalAlpha = 0.14;
    ctx.fillStyle = c1;
    ctx.fillRect(sx, by, rw, rh);

    // Roof units / antennas.
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = c2;
    ctx.fillRect(sx + rw * 0.2, by - 5, rw * 0.22, 5);
    ctx.fillRect(sx + rw * 0.58, by - 8, rw * 0.15, 8);
    ctx.fillRect(sx + rw * 0.76, by - 4, rw * 0.12, 4);
    ctx.strokeStyle = PAL.cyan;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx + rw * 0.68, by - 8);
    ctx.lineTo(sx + rw * 0.68, by - 16 - (i % 3) * 2);
    ctx.stroke();

    ctx.globalAlpha = 0.1;
    for (let wy = by + 10; wy < by + rh - 8; wy += 11) {
      for (let wx = sx + 5; wx < sx + rw - 5; wx += 8) {
        if (((wy + wx + i * 3 + frame / 8) | 0) % 8 < 3) {
          ctx.fillStyle = (i % 2 ? '#95d8ff' : '#ffd37f');
          ctx.fillRect(wx, wy, 3, 2);
        }
      }
    }
  }
  ctx.restore();

  // Elevated transit rails in perspective.
  ctx.save();
  ctx.globalAlpha = 0.24;
  ctx.strokeStyle = PAL.cyan;
  ctx.lineWidth = 1.2;
  for (let r = 0; r < 4; r++) {
    const y = horizon + 28 + r * 26;
    ctx.beginPath();
    ctx.moveTo(centerX - 30, y);
    ctx.lineTo(-W * 0.12, H);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(centerX + 30, y);
    ctx.lineTo(W * 1.12, H);
    ctx.stroke();
  }
  ctx.restore();

  // Transit pods and flying traffic.
  ctx.save();
  for (let i = 0; i < 20; i++) {
    const lane = (i % 4) / 3;
    const dir = (i % 2 === 0) ? 1 : -1;
    const vx = ((i * 140 + dir * t * 180) % (W + 260)) - 130;
    const vy = horizon + 34 + lane * 68 + Math.sin(t * 1.2 + i) * 5;
    const w = 16 + (i % 3) * 6;
    ctx.globalAlpha = 0.25 + lane * 0.15;
    ctx.fillStyle = dir > 0 ? PAL.yellow : PAL.cyan;
    ctx.fillRect(vx, vy, w, 2);
    ctx.globalAlpha = 0.18;
    ctx.fillRect(vx - (dir > 0 ? 28 : 6), vy, 24, 1.5);
  }
  ctx.restore();

  // Aircraft taking off / landing on different vertical lanes.
  ctx.save();
  for (let i = 0; i < 14; i++) {
    const phase = (i * 0.083 + t * (0.09 + (i % 3) * 0.02)) % 1;
    const side = i % 2 ? 1 : -1;
    const startX = centerX + side * (70 + (i % 4) * 26);
    const endX = centerX + side * (260 + (i % 5) * 90);
    const startY = horizon + 48 + (i % 3) * 18;
    const peakY = horizon - 70 - (i % 5) * 24;
    const px = startX + (endX - startX) * phase;
    const py = startY + (peakY - startY) * (phase < 0.5 ? (phase * 2) : (1 - (phase - 0.5) * 2));

    ctx.globalAlpha = 0.2 + 0.3 * (1 - Math.abs(phase - 0.5) * 2);
    ctx.strokeStyle = side > 0 ? PAL.yellow : PAL.cyan;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px - side * 10, py + 2);
    ctx.lineTo(px, py);
    ctx.stroke();

    // Contrail hint.
    ctx.globalAlpha *= 0.5;
    ctx.beginPath();
    ctx.moveTo(px - side * 24, py + 1);
    ctx.lineTo(px - side * 10, py + 2);
    ctx.stroke();
    ctx.globalAlpha *= 2;

    ctx.fillStyle = PAL.white;
    ctx.fillRect(px - 1, py - 1, 2, 2);
  }
  ctx.restore();

  // Road canyon perspective.
  const roadGrad = ctx.createLinearGradient(0, horizon, 0, H);
  roadGrad.addColorStop(0, 'rgba(7,9,20,0.18)');
  roadGrad.addColorStop(1, 'rgba(2,2,7,0.92)');
  ctx.fillStyle = roadGrad;
  ctx.beginPath();
  ctx.moveTo(centerX - 24, horizon + 8);
  ctx.lineTo(centerX + 24, horizon + 8);
  ctx.lineTo(centerX + W * 0.52, H);
  ctx.lineTo(centerX - W * 0.52, H);
  ctx.closePath();
  ctx.fill();

  // Motion lane streaks tuned for smooth, controlled movement.
  ctx.save();
  ctx.strokeStyle = PAL.cyan;
  for (let i = 0; i < 34; i++) {
    const d = (i / 34 + t * speed * 0.06) % 1;
    const p = d * d;
    const y = horizon + p * (H - horizon);
    const half = 18 + p * (W * 0.44);
    ctx.globalAlpha = 0.02 + p * 0.14;
    ctx.beginPath();
    ctx.moveTo(centerX - half, y);
    ctx.lineTo(centerX + half, y);
    ctx.stroke();
  }
  ctx.restore();

  // Near-field building stream with realistic facade detail.
  ctx.save();
  for (let i = 0; i < 220; i++) {
    const side = (i % 2 === 0) ? -1 : 1;
    const r1 = 0.5 + 0.5 * Math.sin(i * 17.19);
    const r2 = 0.5 + 0.5 * Math.sin(i * 9.71 + 1.1);
    const r3 = 0.5 + 0.5 * Math.sin(i * 4.73 + 2.3);
    const depth = (i / 220 + t * speed * 0.072) % 1;
    const p = Math.pow(depth, 1.33);

    const roadHalf = 30 + p * (W * 0.23);
    const lane = 28 + r1 * 150;
    const scale = 0.24 + p * 3.0;

    const bw = (14 + r1 * 38) * scale;
    const bh = (65 + r2 * 330) * scale;
    const groundY = horizon + Math.pow(p, 1.5) * (H - horizon + 120);
    const bx = centerX + side * (roadHalf + lane * scale);
    const by = groundY - bh;

    if (bx + bw < -220 || bx - bw > W + 220 || by > H + 210) continue;

    const faceCol = side < 0 ? '#0d1f43' : '#1d1039';
    const sideCol = side < 0 ? '#132b57' : '#31184a';
    const edgeCol = side < 0 ? PAL.cyan : PAL.yellow;

    ctx.globalAlpha = 0.14 + p * 0.5;
    const facade = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
    facade.addColorStop(0, faceCol);
    facade.addColorStop(1, sideCol);
    ctx.fillStyle = facade;
    ctx.fillRect(bx, by, bw, bh);

    // Extruded side face.
    const extrude = (7 + 18 * p) * side;
    ctx.fillStyle = sideCol;
    ctx.beginPath();
    ctx.moveTo(bx + (side < 0 ? 0 : bw), by);
    ctx.lineTo(bx + (side < 0 ? extrude : bw + extrude), by - 7 * p);
    ctx.lineTo(bx + (side < 0 ? extrude : bw + extrude), by + bh - 7 * p);
    ctx.lineTo(bx + (side < 0 ? 0 : bw), by + bh);
    ctx.closePath();
    ctx.fill();

    // Floor separation lines.
    ctx.globalAlpha = 0.08 + p * 0.18;
    ctx.strokeStyle = side < 0 ? '#2b4d78' : '#4e2c6f';
    ctx.lineWidth = 1;
    const floorStep = Math.max(9, 15 - p * 4);
    for (let fy = by + floorStep; fy < by + bh - 6; fy += floorStep) {
      ctx.beginPath();
      ctx.moveTo(bx + 2, fy);
      ctx.lineTo(bx + bw - 2, fy);
      ctx.stroke();
    }

    // Neon edges.
    ctx.globalAlpha = 0.2 + p * 0.48;
    ctx.strokeStyle = edgeCol;
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, bh);

    // Window matrix with mixed warm/cool interior tones.
    ctx.globalAlpha = 0.12 + p * 0.36;
    for (let wy = by + 8; wy < by + bh - 8; wy += Math.max(8, 14 - p * 4)) {
      for (let wx = bx + 5; wx < bx + bw - 5; wx += 8) {
        if (((wx * 0.21 + wy * 0.19 + i + Math.floor(frame / 9)) | 0) % 9 < 3) {
          ctx.fillStyle = ((wx + wy + i) % 6 === 0) ? '#ffd67a' : ((wx + wy) % 5 === 0 ? '#8bd8ff' : edgeCol);
          ctx.fillRect(wx, wy, 3, 2);
        }
      }
    }

    // Glass reflection streak.
    if (p > 0.3) {
      ctx.globalAlpha = 0.08 + p * 0.18;
      ctx.strokeStyle = 'rgba(210,240,255,0.45)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(bx + bw * 0.18, by + 8);
      ctx.lineTo(bx + bw * 0.42, by + bh - 8);
      ctx.stroke();
    }

    // Holographic billboards on select towers.
    if (r3 > 0.8 && p > 0.2 && p < 0.88) {
      const bw2 = bw * (0.36 + r3 * 0.2);
      const bh2 = 10 + r2 * 18;
      const bx2 = bx + (side < 0 ? bw * 0.18 : bw * 0.46);
      const by2 = by + bh * (0.22 + r1 * 0.2);
      ctx.globalAlpha = 0.18 + p * 0.25;
      ctx.fillStyle = side < 0 ? '#071b2f' : '#2a1a06';
      ctx.fillRect(bx2, by2, bw2, bh2);
      ctx.globalAlpha = 0.4 + p * 0.25;
      ctx.strokeStyle = side < 0 ? PAL.cyan : PAL.yellow;
      ctx.strokeRect(bx2, by2, bw2, bh2);
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = side < 0 ? PAL.cyan : PAL.yellow;
      ctx.fillRect(bx2 + 3, by2 + 3, bw2 - 6, 2);
    }

    // Vertical neon strips / facade accents.
    if (p > 0.25) {
      ctx.globalAlpha = 0.12 + p * 0.2;
      ctx.strokeStyle = side < 0 ? PAL.cyan : PAL.yellow;
      ctx.lineWidth = 1;
      const sx = bx + (side < 0 ? bw * 0.12 : bw * 0.86);
      ctx.beginPath();
      ctx.moveTo(sx, by + 6);
      ctx.lineTo(sx, by + bh - 6);
      ctx.stroke();
    }

    // Rooftop units and blinking safety beacon.
    if (p > 0.35) {
      ctx.globalAlpha = 0.2 + p * 0.25;
      ctx.fillStyle = '#2a2f3f';
      ctx.fillRect(bx + bw * 0.2, by - 5, bw * 0.16, 5);
      ctx.fillRect(bx + bw * 0.58, by - 7, bw * 0.14, 7);
      const beaconX = bx + bw * 0.72;
      const beaconY = by - 9;
      ctx.strokeStyle = '#9fb6d6';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(beaconX, beaconY + 9);
      ctx.lineTo(beaconX, beaconY);
      ctx.stroke();
      if ((Math.floor(frame / 18) + i) % 2 === 0) {
        ctx.fillStyle = '#ff5a5a';
        ctx.fillRect(beaconX - 1, beaconY - 1, 2, 2);
      }
    }
  }
  ctx.restore();

  // Street-level traffic on the perspective road.
  ctx.save();
  for (let i = 0; i < 36; i++) {
    const lane = i % 2 === 0 ? -1 : 1;
    const z = (i / 26 + t * speed * 0.18) % 1;
    const p = z * z;
    const y = horizon + p * (H - horizon);
    const roadHalf = 20 + p * (W * 0.44);
    const cx = centerX + lane * roadHalf * (0.12 + (i % 3) * 0.07);
    const cw = 6 + p * 24;
    const ch = 2 + p * 5;

    ctx.globalAlpha = 0.1 + p * 0.35;
    ctx.fillStyle = '#1b2436';
    ctx.fillRect(cx - cw * 0.5, y - ch * 0.5, cw, ch);

    // Headlights / taillights.
    ctx.fillStyle = lane > 0 ? '#ffd86e' : '#86dfff';
    ctx.fillRect(cx - cw * 0.43, y - ch * 0.35, Math.max(1, cw * 0.18), Math.max(1, ch * 0.45));
    ctx.fillRect(cx + cw * 0.25, y - ch * 0.35, Math.max(1, cw * 0.18), Math.max(1, ch * 0.45));

    ctx.globalAlpha = 0.08 + p * 0.22;
    ctx.fillStyle = lane > 0 ? PAL.yellow : PAL.cyan;
    ctx.fillRect(cx - cw * 1.2, y + ch * 0.8, cw * 2.1, 1.2);
  }
  ctx.restore();

  // Avenue center markings.
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#ffe69a';
  for (let i = 0; i < 18; i++) {
    const d = (i / 18 + t * speed * 0.08) % 1;
    const p = d * d;
    const y = horizon + p * (H - horizon);
    const w = 2 + p * 8;
    const h = 1 + p * 4;
    ctx.fillRect(centerX - w * 0.5, y, w, h);
  }
  ctx.restore();

  // Atmospheric glow and scanlines.
  const fog = ctx.createLinearGradient(0, horizon, 0, H);
  fog.addColorStop(0, 'rgba(0,240,255,0.03)');
  fog.addColorStop(0.55, 'rgba(200,0,255,0.03)');
  fog.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = fog;
  ctx.fillRect(0, horizon, W, H - horizon);

  ctx.globalAlpha = 0.065;
  ctx.fillStyle = '#000';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);

  ctx.restore();
}

function drawEdgyLogoWordmark(x, y, scale = 1, alpha = 1) {
  const title = 'cyberbug2077';
  const titleSize = Math.min(W / 11.8, 68) * scale;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.translate(x, y);

  // Straight, terminal-like title (no angle/skew) with VS Code-style monospace feel.
  ctx.font = `700 ${titleSize}px Consolas, 'Courier New', monospace`;
  glow(PAL.cyan, 8);
  ctx.fillStyle = 'rgba(0,240,255,0.55)';
  ctx.fillText(title, 2, 0);
  noGlow();

  glow(PAL.yellow, 12);
  ctx.fillStyle = '#f6f04a';
  ctx.fillText(title, 0, 0);
  noGlow();

  // Crisp terminal guide lines.
  const w = ctx.measureText(title).width;
  const lineY = titleSize * 0.24;
  ctx.strokeStyle = 'rgba(0,240,255,0.7)';
  ctx.lineWidth = 1.6;
  ctx.setLineDash([8,6]);
  ctx.beginPath();
  ctx.moveTo(-w * 0.56, lineY);
  ctx.lineTo(w * 0.56, lineY);
  ctx.stroke();
  ctx.setLineDash([]);

  const cursorOn = frame % 50 < 25;
  if (cursorOn) {
    ctx.fillStyle = PAL.cyan;
    ctx.fillRect(w * 0.52, -titleSize * 0.7, Math.max(2, titleSize * 0.06), titleSize * 0.82);
  }

  ctx.font = `600 ${Math.max(10, titleSize * 0.28)}px Consolas, 'Courier New', monospace`;
  ctx.fillStyle = PAL.greyLight;
  ctx.fillText('> run --mode infinite', 0, titleSize * 0.56);

  ctx.restore();
}

function drawIntroPanTransition() {
  const t = Math.min(1, introPanFrame / INTRO_PAN_FRAMES);
  const smooth = v => {
    const c = Math.max(0, Math.min(1, v));
    return c * c * (3 - 2 * c);
  };
  const flyT = smooth(t / 0.7);
  const blend2D = smooth((t - 0.28) / 0.72);
  const settle = smooth((t - 0.6) / 0.4);

  drawLoadingCity3D(0.35 + flyT * 1.15, 1);

  // Speed streaks while flying through towers.
  ctx.save();
  ctx.globalAlpha = (1 - blend2D) * 0.26;
  ctx.fillStyle = PAL.cyan;
  for (let i = 0; i < 12; i++) {
    const sy = H * (0.15 + i * 0.06);
    const sw = W * (0.2 + i * 0.05);
    ctx.fillRect(-W * 0.25 + flyT * W * 0.9, sy, sw, 2);
  }
  ctx.restore();

  // Clean pan into the standard 2D landscape and skyline.
  if (blend2D > 0) {
    ctx.save();
    ctx.globalAlpha = Math.pow(blend2D, 1.2);

    const prevCamX = cam.x;
    const prevTut = tutorialCompleted;
    tutorialCompleted = false;
    cam.x = (1 - settle) * 520;
    drawBackground();
    drawGround();
    tutorialCompleted = prevTut;
    cam.x = prevCamX;

    ctx.restore();
  }

  // Cinematic bars retract as we settle into gameplay view.
  const bar = (1 - blend2D) * H * 0.14;
  if (bar > 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, bar);
    ctx.fillRect(0, H - bar, W, bar);
  }

  drawEdgyLogoWordmark(W/2, H*0.15 - blend2D * 14, 1 - blend2D * 0.1, 1 - blend2D * 0.92);
}

function drawLoadingScreen() {
  // Slow, controlled idle drift (Mac screensaver vibe).
  drawLoadingCity3D(0.11 + 0.04 * Math.sin(frame * 0.0045), 1);

  const shade = ctx.createLinearGradient(0, 0, 0, H * 0.42);
  shade.addColorStop(0, 'rgba(0,0,0,0.74)');
  shade.addColorStop(1, 'rgba(0,0,0,0.08)');
  ctx.fillStyle = shade;
  ctx.fillRect(0, 0, W, H * 0.42);

  drawEdgyLogoWordmark(W/2, H*0.15, 1, 1);

  const logoX = W / 2;
  const logoY = H * 0.15;

  ctx.save();
  ctx.globalAlpha = 0.28 + 0.16 * Math.sin(frame * 0.13);
  ctx.fillStyle = PAL.cyan;
  for (let i=0; i<4; i++) {
    const gy = logoY - 22 + i * 11 + Math.sin(frame * 0.17 + i) * 2;
    ctx.fillRect(logoX - 220 + i * 18, gy, 170 + i * 38, 2);
  }
  ctx.restore();

  if (!showCodex) {
    // Boot terminal card
    const termW = Math.min(620, W * 0.82);
    const termX = W/2 - termW/2;
    const termY = H * 0.28;
    const termH = 260;

    ctx.save();
    ctx.fillStyle = 'rgba(6, 8, 18, 0.84)';
    ctx.fillRect(termX, termY, termW, termH);
    ctx.strokeStyle = PAL.cyan;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(termX, termY, termW, termH);
    ctx.strokeStyle = PAL.yellow;
    ctx.globalAlpha = 0.55 + 0.25 * Math.sin(frame * 0.1);
    ctx.strokeRect(termX + 5, termY + 5, termW - 10, termH - 10);
    ctx.globalAlpha = 1;

    // pulse corners
    const cLen = 22;
    const corners = [
      [termX, termY],
      [termX + termW, termY],
      [termX, termY + termH],
      [termX + termW, termY + termH]
    ];
    ctx.strokeStyle = PAL.yellow;
    ctx.lineWidth = 2;
    for (const c of corners) {
      const x = c[0], y = c[1];
      const sx = (x === termX) ? 1 : -1;
      const sy = (y === termY) ? 1 : -1;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + sx * cLen, y);
      ctx.moveTo(x, y);
      ctx.lineTo(x, y + sy * cLen);
      ctx.stroke();
    }
    ctx.restore();

    // Boot terminal
    ctx.textAlign='left';
    ctx.font = '13px Courier New';

    for (let i=0; i<BOOT_LINES.length; i++) {
      if (i > loadBootIdx) break;
      const line = i < loadBootIdx ? BOOT_LINES[i].text : BOOT_LINES[i].text.slice(0, loadBootChar);
      const isLast = i === BOOT_LINES.length-1;
      glow(BOOT_LINES[i].col, isLast?12:5);
      ctx.fillStyle = BOOT_LINES[i].col;
      ctx.fillText(line, termX + 26, termY + 38 + i*24);
    }

    // Cursor
    if (loadBootDone && frame%40<22) {
      glow(PAL.cyan, 8);
      ctx.fillStyle = PAL.cyan;
      ctx.fillRect(termX + 26, termY + 38 + BOOT_LINES.length*24 - 14, 8, 14);
    }

    noGlow();

    // Obstacle codex preview prompt
    if (loadBootDone) {
      ctx.textAlign='center';
      ctx.globalAlpha = 0.6+0.4*Math.sin(frame*0.08);
      glow(PAL.yellow, 10);
      ctx.fillStyle = PAL.yellow;
      ctx.font = '12px Courier New';
      ctx.fillText('◈ [ENTER] START RUN  |  [C] OPEN CODEX', W/2, H-35);
      noGlow();
      ctx.globalAlpha=1;
    }
  } else {
    // CODEX VIEW
    drawCodex();
  }

  ctx.textAlign='left';
}

function drawCodex() {
  const cx2 = W/2;
  ctx.textAlign='center';
  ctx.fillStyle = PAL.cyan;
  glow(PAL.cyan, 12);
  ctx.font = 'bold 18px Courier New';
  ctx.fillText('OBSTACLE CODEX', cx2, H*0.25);
  noGlow();
  ctx.fillStyle = PAL.greyLight;
  ctx.font = '10px Courier New';
  ctx.fillText('[↑/↓] scroll  |  [ENTER] play', cx2, H*0.25+20);

  const startY = H*0.32 - codexScrollY;
  const cardH = 95;
  const cardW = Math.min(W*0.7, 700);
  const cxOff = cx2 - cardW/2;

  ctx.save();
  // Clip to codex area
  ctx.beginPath();
  ctx.rect(0, H*0.29, W, H*0.6);
  ctx.clip();

  for (let i=0; i<CODEX_ENTRIES.length; i++) {
    const e = CODEX_ENTRIES[i];
    const cy = startY + i * (cardH + 12);
    if (cy > H || cy + cardH < H*0.29) continue;

    ctx.save();
    glow(e.col, 8);
    ctx.strokeStyle = e.col;
    ctx.lineWidth = 1.5;
    ctx.fillStyle = '#08040f';
    ctx.fillRect(cxOff, cy, cardW, cardH);
    ctx.strokeRect(cxOff, cy, cardW, cardH);

    // Symbol badge
    ctx.fillStyle = e.col+'22';
    ctx.fillRect(cxOff, cy, 70, cardH);
    ctx.fillStyle = e.col;
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign='center';
    ctx.fillText(e.symbol, cxOff+35, cy+cardH/2+5);

    // Entry text
    ctx.textAlign='left';
    ctx.fillStyle = e.col;
    ctx.font = 'bold 12px Courier New';
    ctx.fillText(e.name, cxOff+80, cy+18);
    ctx.fillStyle = PAL.greyLight;
    ctx.font = '10px Courier New';
    ctx.fillText('LOOKS LIKE: '+e.look, cxOff+80, cy+34);
    ctx.fillText('DO: '+e.action, cxOff+80, cy+50);
    ctx.fillStyle = PAL.yellow;
    ctx.fillText('EFFECT: '+e.effect, cxOff+80, cy+66);
    noGlow();
    ctx.restore();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  TUTORIAL OVERLAY
// ═══════════════════════════════════════════════════
function drawTutorialOverlay() {
  if (tutorialCompleted) return;

  const currentStepIdx = TUT_STEPS.findIndex(s=>!s.done());
  if (currentStepIdx < 0) return;
  const step = TUT_STEPS[currentStepIdx];

  // Progress dots
  ctx.save();
  const dotCount = TUT_STEPS.length;
  const dotSpacing = 22;
  const dotsX = W/2 - (dotCount*dotSpacing)/2;
  const dotsY = 20;
  for (let i=0; i<dotCount; i++) {
    const done = TUT_STEPS[i].done();
    const active = i === currentStepIdx;
    ctx.beginPath();
    ctx.arc(dotsX + i*dotSpacing, dotsY, active?5:3, 0, Math.PI*2);
    if (done) { glow(PAL.cyan,6); ctx.fillStyle=PAL.cyan; }
    else if (active) { glow(PAL.yellow,10); ctx.fillStyle=PAL.yellow; }
    else { ctx.fillStyle=PAL.grey; }
    ctx.fill();
    noGlow();
  }

  // Step instruction card
  const cardW = Math.min(W*0.6, 500), cardH = 70;
  const cardX = W/2-cardW/2, cardY = 28;
  ctx.fillStyle = '#05000f';
  ctx.strokeStyle = PAL.yellow;
  ctx.lineWidth = 1.5;
  ctx.fillRect(cardX, cardY, cardW, cardH);
  ctx.strokeRect(cardX, cardY, cardW, cardH);

  ctx.textAlign='center';
  glow(PAL.yellow, 10);
  ctx.fillStyle = PAL.yellow;
  ctx.font = 'bold 13px Courier New';
  ctx.fillText(`TUTORIAL  [${currentStepIdx+1}/${TUT_STEPS.length}]  ${step.title}`, W/2, cardY+20);
  noGlow();
  ctx.fillStyle = PAL.white;
  ctx.font = '11px Courier New';
  ctx.globalAlpha = 0.9;
  // Split desc on \n
  const lines = step.desc.split('\n');
  lines.forEach((l,i)=>ctx.fillText(l, W/2, cardY+38+i*15));
  ctx.globalAlpha=1;
  ctx.textAlign='left';
  ctx.restore();

  // Arrow pointing to next objective
  if (currentStepIdx >= 2) {
    const tgt = tutorialObstacles.find(o=>o._tutStep===currentStepIdx+1||o._tutStep===currentStepIdx);
    if (tgt) {
      const tx = tgt.x - cam.x + (tgt.w||0)/2;
      const ty = tgt.y - 30;
      // Arrow
      ctx.save();
      ctx.globalAlpha = 0.7+0.3*Math.sin(frame*0.12);
      const arrowY = ty - Math.sin(frame*0.1)*5;
      glow(PAL.yellow, 12);
      ctx.fillStyle = PAL.yellow;
      ctx.beginPath();
      ctx.moveTo(tx, arrowY+12);
      ctx.lineTo(tx-8, arrowY);
      ctx.lineTo(tx+8, arrowY);
      ctx.closePath(); ctx.fill();
      noGlow();
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════════════
//  GAME OVER SCREEN
// ═══════════════════════════════════════════════════
function drawGameOver() {
  deathTimer++;
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  // Red scanlines
  ctx.save();
  for (let y=0;y<H;y+=4) {
    ctx.globalAlpha = 0.12+0.08*Math.sin(y*0.12+frame*0.05);
    ctx.fillStyle = PAL.red;
    ctx.fillRect(0,y,W,2);
  }
  ctx.restore();

  ctx.textAlign='center';

  const shake = deathTimer < 30 ? (Math.random()-0.5)*8 : 0;

  glow(PAL.red, 40);
  ctx.fillStyle = PAL.red;
  ctx.font = `bold ${Math.min(W/9,80)}px Courier New`;
  ctx.fillText('PROCESS TERMINATED', W/2+shake, H/2-70+shake);
  noGlow();

  if (deathTimer > 20) {
    ctx.fillStyle = PAL.redDim;
    ctx.font = '15px Courier New';
    ctx.fillText('caught by debugger', W/2, H/2-20);

    ctx.fillStyle = PAL.white;
    ctx.font = '20px Courier New';
    ctx.fillText(`CORRUPTION SCORE: ${Math.round(corruption).toString().padStart(6,'0')}`, W/2, H/2+15);

    if (corruption >= highScore - 1) {
      glow(PAL.yellow, 16);
      ctx.fillStyle = PAL.yellow;
      ctx.font = 'bold 14px Courier New';
      ctx.fillText('◈ NEW HIGH SCORE ◈', W/2, H/2+40);
      noGlow();
    } else {
      ctx.fillStyle = PAL.greyLight;
      ctx.font = '13px Courier New';
      ctx.fillText(`HIGH SCORE: ${Math.round(highScore).toString().padStart(6,'0')}`, W/2, H/2+40);
    }
  }

  if (deathTimer > 60) {
    ctx.globalAlpha = 0.7+0.3*Math.sin(frame*0.1);
    ctx.fillStyle = PAL.red;
    ctx.font = '14px Courier New';
    ctx.fillText('[ ENTER ] run again', W/2, H/2+85);
    ctx.globalAlpha=1;
  }

  ctx.textAlign='left';
}

// ═══════════════════════════════════════════════════
//  TUTORIAL COMPLETE FLASH
// ═══════════════════════════════════════════════════
let tutCompleteFlash = 0;
function drawTutCompleteFlash() {
  if (tutCompleteFlash <= 0) return;
  tutCompleteFlash--;
  ctx.save();
  ctx.globalAlpha = tutCompleteFlash/60 * 0.7;
  ctx.fillStyle = PAL.cyan;
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.globalAlpha = tutCompleteFlash/60;
  glow(PAL.cyan, 30);
  ctx.fillStyle = PAL.white;
  ctx.font = `bold ${Math.min(W/8,72)}px Courier New`;
  ctx.fillText('TUTORIAL COMPLETE', W/2, H/2-20);
  noGlow();
  ctx.fillStyle = PAL.yellow;
  ctx.font = '16px Courier New';
  ctx.fillText('now go corrupt everything', W/2, H/2+20);
  ctx.textAlign='left';
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  MAIN UPDATE / RENDER
// ═══════════════════════════════════════════════════
function update() {
  if (isPaused) return;
  frame++;

  // Background music scheduling
  if (ac && musicPlaying) scheduleMusicBeat();

  if (gameState === 'loading') {
    updateLoadingScreen();
    // Input on loading screen
    if (loadBootDone) {
      if (justPressed['Enter']) {
        if (showCodex) showCodex = false;
        beginRunFromLoading();
      }
      if (justPressed['KeyC']) { showCodex=!showCodex; codexScrollY=0; codexTargetY=0; }
      if (showCodex) {
        if (justPressed['ArrowDown']) codexTargetY = Math.min(codexTargetY+80, CODEX_ENTRIES.length*107-200);
        if (justPressed['ArrowUp']) codexTargetY = Math.max(codexTargetY-80, 0);
      }
    }
    return;
  }

  if (gameState === 'introPan') {
    introPanFrame++;
    if (introPanFrame >= INTRO_PAN_FRAMES) {
      if (introPanTarget === 'tutorial') startTutorial();
      else startInfiniteRun({ preservePlayerPos: false, playCelebrateFx: false });
    }
    return;
  }

  if (gameState === 'gameover') {
    if (deathTimer > 60 && justPressed['Enter']) restartGame();
    return;
  }

  if (gameState === 'tutorial' || gameState === 'playing') {
    // Always evaluate completion in-case player finishes steps in an unexpected order.
    if (gameState === 'tutorial') checkTutorialAdvance();

    updatePlayer();
    updateCamera();
    updateTrail();
    updateParticles();
    updateObstacles();
    if (tutorialCompleted) {
      updatePickups();
      updateDebuggers();
      updateCorruptionPassive();
      updateHeatDirector();
      updateRunGoal();
    }
  }
}

function render() {
  ctx.clearRect(0,0,W,H);

  if (gameState === 'loading') { drawLoadingScreen(); return; }
  if (gameState === 'introPan') { drawIntroPanTransition(); return; }
  if (gameState === 'gameover') { drawGameOver(); return; }

  drawBackground();
  drawGround();
  drawTrail();
  drawParticles();
  drawPlatforms();
  drawObstacles();
  drawCoins();
  drawDebuggers();
  drawPlayer();
  drawUI();
  drawPauseButton();
  drawTutorialOverlay();
  drawTutCompleteFlash();
  drawPauseOverlay();
}

function startTutorial() {
  // Tutorial remains first-entry only: once started, we persist completion gate.
  tutorialSeen = true;
  try { localStorage.setItem('runtime_tutorial_seen', '1'); } catch (e) {}
  isPaused = false;
  runGoal = null;
  comboTier = 0;
  comboChainIndex = 0;
  comboTimer = 0;
  heat = 0;
  goalToast = '';
  goalToastTimer = 0;
  worldChunks.clear();
  memBlocks = [];
  varChangedCount = 0;
  inFunctionZone = false;
  cam.x = 0; cam.tx = 0;
  initDebuggers();
  initTutorial();
  initPlayer();
  gameState = 'tutorial';
}

// ═══════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════
function loop() {
  update();
  render();
  clearJP();
  requestAnimationFrame(loop);
}

loop();
</script>
