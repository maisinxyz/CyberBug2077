const keys = {};

function togglePause() {
  if (gameState === 'loading' || gameState === 'gameover') return;
  isPaused = !isPaused;
  if (isPaused) {
    // Clear one-frame input so buffered actions do not fire on resume.
    clearJP();
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Escape' || e.code === 'KeyP') {
    e.preventDefault();
    togglePause();
    return;
  }
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('click', e => {
  if (gameState === 'loading' || gameState === 'gameover') return;
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top) * (H / r.height);
  if (
    mx >= pauseButtonRect.x && mx <= pauseButtonRect.x + pauseButtonRect.w &&
    my >= pauseButtonRect.y && my <= pauseButtonRect.y + pauseButtonRect.h
  ) {
    togglePause();
  }
});

function clearJP() { for (let k in justPressed) delete justPressed[k]; }

// ═══════════════════════════════════════════════════
//  AUDIO ENGINE — GENERATIVE SYNTHWAVE
// ═══════════════════════════════════════════════════
let ac = null;
let musicNodes = {};
let musicPlaying = false;

function getAC() { if(!ac) ac = new(window.AudioContext||window.webkitAudioContext)(); return ac; }

function tone(freq, type, dur, vol=0.25, fEnd=null, delay=0, detune=0) {
  try {
    const a=getAC(); const t=a.currentTime+delay;
    const osc=a.createOscillator(), g=a.createGain();
    osc.connect(g); g.connect(a.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq,t); osc.detune.value=detune;
    if(fEnd) osc.frequency.exponentialRampToValueAtTime(fEnd,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    osc.start(t); osc.stop(t+dur+0.05);
  } catch(e){}
}

function noise(dur=0.05, vol=0.12, delay=0) {
  try {
    const a=getAC(); const t=a.currentTime+delay;
    const buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=a.createBufferSource(), g=a.createGain();
    src.buffer=buf; src.connect(g); g.connect(a.destination);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.start(t);
  } catch(e){}
}

// Synthwave bass + arp
let musicBeat = 0;
let nextBeatTime = 0;
const BPM = 128;
const BEAT = 60/BPM;
const bassNotes = [55, 55, 41, 46, 49, 49, 41, 43];
const arpNotes  = [220,330,440,330,220,165,220,330, 277,415,554,415,277,220,277,415];

function scheduleMusicBeat() {
  try {
    const a=getAC();
    if(a.currentTime < nextBeatTime - 0.1) return;
    const t = nextBeatTime;

    // Bass pulse (every beat)
    const bassFreq = bassNotes[musicBeat % bassNotes.length];
    const osc1 = a.createOscillator(), g1 = a.createGain();
    const filt = a.createBiquadFilter();
    filt.type='lowpass'; filt.frequency.value=200;
    osc1.type='sawtooth'; osc1.frequency.value=bassFreq;
    osc1.connect(filt); filt.connect(g1); g1.connect(a.destination);
    g1.gain.setValueAtTime(0.28,t); g1.gain.exponentialRampToValueAtTime(0.001,t+BEAT*0.9);
    osc1.start(t); osc1.stop(t+BEAT+0.05);

    // Arp (every half beat)
    const arpFreq = arpNotes[(musicBeat*2)%arpNotes.length];
    const arpFreq2 = arpNotes[(musicBeat*2+1)%arpNotes.length];
    [arpFreq, arpFreq2].forEach((f, i) => {
      const o=a.createOscillator(), g=a.createGain();
      o.type='square'; o.frequency.value=f; o.detune.value=5;
      const flt=a.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=f*1.5; flt.Q.value=2;
      o.connect(flt); flt.connect(g); g.connect(a.destination);
      g.gain.setValueAtTime(0.06,t+i*BEAT*0.5); g.gain.exponentialRampToValueAtTime(0.001,t+i*BEAT*0.5+BEAT*0.4);
      o.start(t+i*BEAT*0.5); o.stop(t+i*BEAT*0.5+BEAT*0.5);
    });

    // Kick (beats 1 and 3)
    if (musicBeat % 4 === 0 || musicBeat % 4 === 2) {
      const ko=a.createOscillator(), kg=a.createGain();
      ko.type='sine'; ko.frequency.setValueAtTime(150,t); ko.frequency.exponentialRampToValueAtTime(40,t+0.15);
      ko.connect(kg); kg.connect(a.destination);
      kg.gain.setValueAtTime(0.5,t); kg.gain.exponentialRampToValueAtTime(0.001,t+0.2);
      ko.start(t); ko.stop(t+0.25);
    }

    // Snare (beats 2 and 4)
    if (musicBeat % 4 === 1 || musicBeat % 4 === 3) {
      noise(0.12, 0.18, t - a.currentTime);
      tone(200,'sine',0.1,0.15,null,t-a.currentTime);
    }

    // Hi-hat
    noise(0.04, 0.06, t - a.currentTime);

    nextBeatTime = t + BEAT;
    musicBeat++;
  } catch(e){}
}

// ═══════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════
const particles = [];
function spawnPart(wx,wy,col,count=10,speed=4) {
  for(let i=0;i<count;i++) {
    const a=Math.PI*2*i/count+(Math.random()-0.5)*1.2;
    const s=speed*(0.4+Math.random()*0.8);
    particles.push({x:wx,y:wy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.016+Math.random()*0.02,size:1.5+Math.random()*3.5,col});
  }
}
function updateParticles() {
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
}

const trail = [];
function addTrail(x,y) {
  if(frame%2===0) trail.push({x,y,life:1});
  if(trail.length>120) trail.shift();
}
function updateTrail() { trail.forEach(t=>{t.life-=0.008;}); }

// ═══════════════════════════════════════════════════
//  INFINITE WORLD GENERATION
// ═══════════════════════════════════════════════════
// Chunk-based: each chunk is CHUNK_W pixels wide
// We generate chunks on demand based on camera position

const worldChunks = new Map(); // chunkIdx -> chunk data
const OBSTACLE_TYPES = ['variable','loop','warp','null','gate'];

function chunkSeed(idx) {
  // Deterministic pseudo-random from chunk index
  let s = idx * 2654435761;
  s = s ^ (s >>> 16);
  s = Math.imul(s, 0x45d9f3b);
  s = s ^ (s >>> 16);
  return s >>> 0;
}

function seededRand(seed, n) {
  // returns float 0..1
  seed = (seed * 1664525 + 1013904223) & 0xffffffff;
  return ((seed >>> 0) / 0x100000000 + (n||0)) % 1;
}

function generateChunk(idx) {
  if (worldChunks.has(idx)) return worldChunks.get(idx);
  const GY = H - GY_OFF;
  const baseX = idx * CHUNK_W;
  let seed = chunkSeed(idx);
  const sr = () => {
    seed = (seed * 1664525 + 1013904223) >>> 0;
    return seed / 0x100000000;
  };

  const chunk = { idx, baseX, platforms:[], obstacles:[], nullZones:[], coins:[], powerups:[] };

  // Ground is continuous (handled globally)
  // Platforms: 2-4 per chunk
  const numPlat = 2 + Math.floor(sr()*3);
  const platAttempts = [];
  for (let i=0; i<numPlat; i++) {
    const px = baseX + 80 + sr() * (CHUNK_W - 200);
    const py = GY - 110 - sr() * 220;
    const pw = 90 + sr() * 100;
    // Avoid overlaps
    let ok = true;
    for (const p2 of platAttempts) {
      if (Math.abs(px - p2.x) < pw + 30 && Math.abs(py - p2.y) < 60) { ok=false; break; }
    }
    if (ok) platAttempts.push({ x:px, y:py, w:pw, h:12 });
  }
  chunk.platforms = platAttempts;

  // Null zones: 0-1 per chunk (gaps in ground)
  if (idx !== 0 && sr() > 0.55) {
    const nzX = baseX + 200 + sr() * (CHUNK_W - 400);
    const nzW = 100 + sr() * 130;
    chunk.nullZones.push({ x:nzX, w:nzW });
  }

  // Obstacles: guaranteed variety per chunk
  // Each chunk always has 2-3 obstacles, rotating through all types so every type appears
  const obstDensity = 2 + Math.floor(sr() * 2); // 2-3 per chunk always
  // Guarantee type variety: pick from a rotating sequence based on chunk index
  // so adjacent chunks won't be all the same type
  const typeRotation = ['variable', 'loop', 'warp', 'gate', 'variable', 'loop', 'warp', 'variable'];
  for (let i=0; i<obstDensity; i++) {
    // Mix: one from rotation (for variety guarantee), rest random
    const type = i === 0
      ? typeRotation[Math.abs(idx * 3 + i) % typeRotation.length]
      : OBSTACLE_TYPES[Math.floor(sr() * (OBSTACLE_TYPES.length - 1))]; // exclude 'null' from random — it's a ground feature
    const spacing = (CHUNK_W - 200) / obstDensity;
    const ox = baseX + 100 + spacing * i + sr() * spacing * 0.6;
    const oy = GY - 40;
    const obstacle = makeObstacle(type, ox, oy, idx, sr);
    chunk.obstacles.push(obstacle);

    // Some variable nodes control nearby floating platforms (coin/powerup routing).
    if (obstacle.type === 'variable' && sr() > 0.35) {
      const baseY = GY - 130 - sr() * 160;
      const upY = Math.max(GY - 340, baseY - (70 + sr() * 55));
      const downY = Math.min(GY - 95, baseY + (55 + sr() * 35));
      chunk.platforms.push({
        x: ox + 40 + (sr() - 0.5) * 140,
        y: baseY,
        w: 90 + sr() * 40,
        h: 12,
        type: 'varplat',
        controllerId: obstacle.id,
        baseY,
        map: { 1: baseY, 2: upY, 3: downY }
      });
    }
  }

  // Coins: 1-3 per chunk, scattered on platforms + mid-air
  const numCoins = 1 + Math.floor(sr() * 3);
  const rewardPlats = chunk.platforms.filter(p => p.type === 'varplat' || p.type === undefined);
  for (let i=0; i<numCoins; i++) {
    const srcPlat = rewardPlats[Math.floor(sr()*rewardPlats.length)];
    if (srcPlat) {
      chunk.coins.push({ x: srcPlat.x + srcPlat.w/2 + (sr()-0.5)*60, y: srcPlat.y - 25, collected:false, pulseT:0 });
    } else {
      chunk.coins.push({ x: baseX + 100 + sr()*(CHUNK_W-200), y: GY - 80 - sr()*150, collected:false, pulseT:0 });
    }
  }

  // Invisibility powerup: rare, ~1 per 5 chunks
  if (sr() > 0.78) {
    const srcPlat = rewardPlats[Math.floor(sr()*rewardPlats.length)];
    const ipx = srcPlat ? srcPlat.x + srcPlat.w/2 : baseX + CHUNK_W/2;
    const ipy = srcPlat ? srcPlat.y - 30 : GY - 120;
    chunk.powerups.push({ x:ipx, y:ipy, type:'invis', collected:false, pulseT:0 });
  }

  worldChunks.set(idx, chunk);
  return chunk;
}

function makeObstacle(type, ox, oy, chunkIdx, sr) {
  const GY = H - GY_OFF;
  // Unique id
  const id = `${type}_${chunkIdx}_${Math.floor(sr()*1000)}`;
  if (type === 'variable') {
    const labels = ['x','y','z','a','b','i','n','ptr','buf','ref'];
    const lbl = labels[Math.floor(sr()*labels.length)];
    const val = Math.floor(1+sr()*2);
    const col = PAL.cyan;
    return { id, type:'variable', x:ox, y:oy, w:82, h:32, lbl, value:val, min:1, max:3, col,
             used:false, _touching:false, _debounce:-1,
             desc: 'Walk into to increment value. Unlocks platforms.' };
  } else if (type === 'loop') {
    const lw = 280 + Math.floor(sr()*120);
    const lh = 200 + Math.floor(sr()*80);
    const ly = GY - lh;
    return { id, type:'loop', x:ox, y:ly, w:lw, h:lh,
             wireX: ox + lw*0.6, wireY: ly + lh*0.75,
             broken:false, entered:false, wireGlow:0, _justTeleported:false,
             desc: 'Traps you in loop. Jump to CUT the wire and break out.' };
  } else if (type === 'warp') {
    const destDx = 300 + sr()*400;
    return { id, type:'warp', x:ox, y:GY-42, w:30, h:42, destDx, col:PAL.purple, _destX: ox + destDx,
             used:false, _onPad:false, pulseT:0,
             desc: 'Function warp. Step on to teleport forward briefly.' };
  } else if (type === 'null') {
    // A null-themed variable node — visually distinct (purple), same interaction as variable
    const col = PAL.purple;
    return { id, type:'variable', x:ox, y:oy, w:90, h:32, lbl:'null_ptr', value:0, min:0, max:2, col,
             used:false, _touching:false, _debounce:-1,
             desc:'Null pointer node. Walk into to corrupt the null reference.' };
  } else {
    // gate
    return { id, type:'gate', x:ox, y:GY-180, w:16, h:180, col:PAL.yellow,
             open:false, lbl:'if(x>1)', varRef: null,
             desc: 'Blocks path until linked variable condition is met.' };
  }
}

// ═══════════════════════════════════════════════════
//  DEBUGGERS
// ═══════════════════════════════════════════════════
let debuggers = [];
let debuggerSpawnTimer = 0;
const DBG_SPAWN_BASE = 600; // frames between spawns initially

function initDebuggers() {
  debuggers = [];
  debuggerSpawnTimer = DBG_SPAWN_BASE;
}

function getDebuggerCount() {
  const heatBand = Math.floor(heat / 26);
  const corruptionBand = Math.floor(corruption / 700);
  return Math.max(1, Math.min(6, 1 + heatBand + Math.min(1, corruptionBand)));
}

function getDebuggerSpeed() {
  return Math.min(1.8 + heat * 0.03, 5.4);
}

function getScanRadiusNow() {
  const baseRadius = SCAN_RADIUS + Math.min(80, heat * 0.8);
  return baseRadius * DEBUGGER_SCAN_RADIUS_SCALE;
}

function getScanFramesNow() {
  return Math.max(55, SCAN_FRAMES - Math.floor(heat * 0.32));
}

function spawnDebugger() {
  const GY = H - GY_OFF;
  const spd = getDebuggerSpeed();
  // Spawn off-screen either side
  const side = Math.random() < 0.5 ? -1 : 1;
  const spawnX = player.x + side * (W * 0.7 + 100);
  debuggers.push({
    x: spawnX, y: GY - 24, vx:0, vy:0,
    speed: spd, onGround:false,
    scanTimer:0, scanning:false, scanPulse:0, cooldown:0,
    lockTimer:0,
    scanRadius:getScanRadiusNow(),
    dir: -side, w:16, h:24,
    health: 1, // can be "stunned" by invis
    stunTimer: 0,
    patrolX1: spawnX - 600, patrolX2: spawnX + 100,
    id: Date.now() + Math.random(),
  });
}

function updateDebuggers() {
  if (!tutorialCompleted) return;
  const GY = H - GY_OFF;
  const scanRadius = getScanRadiusNow();
  const scanFrames = getScanFramesNow();

  // Spawn new debuggers
  debuggerSpawnTimer--;
  if (debuggerSpawnTimer <= 0 && debuggers.length < getDebuggerCount()) {
    spawnDebugger();
    const interval = Math.max(150, DBG_SPAWN_BASE - heat * 4);
    debuggerSpawnTimer = interval;
  }

  // Update speed of existing debuggers
  const targetSpd = getDebuggerSpeed();
  for (const d of debuggers) {
    d.speed = targetSpd;
    d.scanRadius = scanRadius;
  }

  for (let di = debuggers.length-1; di >= 0; di--) {
    const d = debuggers[di];

    // Remove debuggers too far away
    if (Math.abs(d.x - player.x) > W * 2.5) {
      debuggers.splice(di, 1);
      continue;
    }

    if (d.cooldown > 0) { d.cooldown--; continue; }

    // Stunned by invisibility
    if (d.stunTimer > 0) {
      d.stunTimer--;
      // Wandering randomly
      d.x += (Math.random()-0.5)*2;
      continue;
    }

    // Invisibility tiers control detection quality.
    const detectMult = invisTier === 1 ? 0.55 : (invisTier >= 2 ? 0 : 1);
    const canSee = detectMult > 0;
    const canScan = invisTier <= 1;

    // Movement: hunt player trail or patrol
    const trailPts = trail.filter(t=>t.life>0.15);
    let targetX = null;

    if (canSee && Math.abs(player.x - d.x) < W * detectMult + 140) {
      const tp = trailPts.length > 0 ? trailPts[trailPts.length-1] : null;
      if (tp) targetX = tp.x;
    } else if (!canSee) {
      // Hunt last known position (last trail point)
      if (trailPts.length > 0) targetX = trailPts[0].x;
    }

    if (targetX !== null) {
      const dx = targetX - d.x;
      d.dir = dx > 0 ? 1 : -1;
      d.x += d.dir * d.speed;
    } else {
      if (d.x <= d.patrolX1) d.dir = 1;
      if (d.x >= d.patrolX2) d.dir = -1;
      d.x += d.dir * (d.speed * 0.4);
    }

    // Gravity
    d.vy += GRAVITY * 0.6;
    if (d.y + d.h >= GY) { d.y = GY - d.h; d.vy = 0; d.onGround = true; }
    else d.onGround = false;
    d.y += d.vy;

    // Scan
    const pdx = player.x + P_W/2 - (d.x + d.w/2);
    const pdy = player.y + P_H/2 - (d.y + d.h/2);
    const pdist = Math.sqrt(pdx*pdx + pdy*pdy);

    if (canScan && canSee && pdist < d.scanRadius && hasLineOfSightToPlayer(d) && !d.scanning) {
      d.scanning = true; d.scanTimer = 0;
      d.lockTimer = 0;
      sfx.scanStart();
    }

    if (d.scanning) {
      if (!canScan || !canSee) { d.scanning = false; d.scanTimer = 0; d.lockTimer = 0; continue; }
      d.scanTimer++;
      d.scanPulse++;
      if (d.scanPulse % 40 === 0) sfx.scanPulse();

      if (d.scanTimer >= scanFrames && d.lockTimer <= 0) {
        d.lockTimer = 16; // fairness grace: telegraph kill lock before execution
      }

      if (d.lockTimer > 0) {
        d.lockTimer--;
      }

      if (d.scanTimer >= scanFrames) {
        const pdx2 = player.x + P_W/2 - (d.x + d.w/2);
        const pdy2 = player.y + P_H/2 - (d.y + d.h/2);
        const stillInLock = Math.sqrt(pdx2*pdx2+pdy2*pdy2) < d.scanRadius && hasLineOfSightToPlayer(d);
        if (d.lockTimer <= 0 && stillInLock && player.invincible <= 0) {
          triggerGameOver();
          return;
        }
        if (!stillInLock) {
          d.scanning = false; d.scanTimer = 0; d.cooldown = 40; d.scanPulse = 0; d.lockTimer = 0;
        }
      }

      if (pdist > d.scanRadius || !hasLineOfSightToPlayer(d)) {
        d.scanning = false; d.scanTimer = 0; d.scanPulse = 0; d.lockTimer = 0;
      }
    }
  }
}

//  GAME MECHANICS - INFINITE WORLD
// ═══════════════════════════════════════════════════
let memBlocks = [];
let varChangedCount = 0;
let nullCooldown = 0;
let inFunctionZone = false;
let functionReturnX = 0;
let functionReturnY = 0;

const COMBO_SEQUENCE = ['variable', 'loop', 'coin', 'warp'];
const RUN_GOALS = [
  { type:'loops', title:'Break 2 loops', target:2 },
  { type:'coins', title:'Collect 3 coins', target:3 },
  { type:'hunt', title:'Survive 8s in hunt', target:8 * 60 },
  { type:'variables', title:'Trigger 3 variables', target:3 },
  { type:'warps', title:'Use 2 warps', target:2 },
];

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function addHeat(amount) {
  heat = clamp(heat + amount, 0, 100);
}

function registerComboEvent(evt) {
  if (!tutorialCompleted) return;
  const expected = COMBO_SEQUENCE[comboChainIndex];
  const inWindow = comboTimer > 0;

  if (evt === expected && (comboChainIndex === 0 || inWindow)) {
    comboChainIndex++;
    comboTimer = COMBO_WINDOW_FRAMES;
    comboLastEvent = evt;
    if (comboChainIndex >= COMBO_SEQUENCE.length) {
      comboTier = clamp(comboTier + 1, 0, 5);
      comboTierTimer = 12 * 60;
      comboChainIndex = 0;
      comboTimer = 0;
      sfx.multiplier && sfx.multiplier();
      spawnPart(player.x+P_W/2, player.y, PAL.yellow, 12, 4);
    }
  } else if (evt === COMBO_SEQUENCE[0]) {
    comboChainIndex = 1;
    comboTimer = COMBO_WINDOW_FRAMES;
    comboLastEvent = evt;
  } else {
    comboChainIndex = 0;
    comboTimer = 0;
    comboLastEvent = evt;
  }
}

function getComboBonusMultiplier() {
  return 1 + comboTier * 0.25;
}

function pickRunGoal(showToast=true) {
  const g = RUN_GOALS[Math.floor(Math.random() * RUN_GOALS.length)];
  const duration = RUN_GOAL_MIN_FRAMES + Math.floor(Math.random() * (RUN_GOAL_MAX_FRAMES - RUN_GOAL_MIN_FRAMES));
  runGoal = { type:g.type, title:g.title, target:g.target, progress:0, timeLeft:duration, justCompleted:0 };
  huntSurviveFrames = 0;
  if (showToast && tutorialCompleted) {
    goalToast = `NEW GOAL: ${runGoal.title}`;
    goalToastTimer = 100;
  }
}

function resetRunDirectorState() {
  heat = 0;
  comboTier = 0;
  comboTierTimer = 0;
  comboChainIndex = 0;
  comboTimer = 0;
  comboLastEvent = '';
  pickRunGoal(false);
}

function advanceRunGoal(type, amount=1) {
  if (!runGoal || runGoal.type !== type) return;
  runGoal.progress += amount;
  if (runGoal.progress >= runGoal.target) {
    goalToast = `GOAL COMPLETE: ${runGoal.title}`;
    goalToastTimer = 140;
    addCorruption(20);
    addHeat(10);
    pickRunGoal();
  }
}

function updateRunGoal() {
  if (!runGoal) pickRunGoal();
  if (!runGoal) return;

  runGoal.timeLeft--;
  if (goalToastTimer > 0) goalToastTimer--;

  if (runGoal.type === 'hunt') {
    const scanning = debuggers.some(d => d.scanning);
    if (scanning) {
      huntSurviveFrames++;
      runGoal.progress = huntSurviveFrames;
      if (runGoal.progress >= runGoal.target) {
        goalToast = `GOAL COMPLETE: ${runGoal.title}`;
        goalToastTimer = 140;
        addCorruption(24);
        addHeat(12);
        pickRunGoal();
        return;
      }
    }
  }

  if (runGoal.timeLeft <= 0) {
    pickRunGoal();
  }
}

function updateHeatDirector() {
  const scanning = debuggers.some(d => d.scanning);
  const nearDist = debuggers.length > 0
    ? debuggers.reduce((acc, d)=>Math.min(acc, Math.hypot(player.x-d.x, player.y-d.y)), 99999)
    : 99999;

  if (scanning) addHeat(0.05);
  if (nearDist < 260) addHeat(0.03);
  if (Math.abs(player.vx) < 1 && !scanning) addHeat(-0.04);
  else addHeat(-0.02);

  if (comboTimer > 0) comboTimer--;
  if (comboTierTimer > 0) comboTierTimer--;
  else if (comboTier > 0) {
    comboTier = Math.max(0, comboTier - 1);
    comboTierTimer = 4 * 60;
  }

  const heatBand = Math.floor(heat / 25);
  if (heatBand !== lastHeatBand) {
    heatHudTimer = 150;
    lastHeatBand = heatBand;
  }
  if (comboTier !== lastComboTier) {
    comboHudTimer = 170;
    lastComboTier = comboTier;
  }
  if (heatHudTimer > 0) heatHudTimer--;
  if (comboHudTimer > 0) comboHudTimer--;
}

function getVisibleChunks() {
  const firstChunk = Math.floor((cam.x - CHUNKS_BEHIND * CHUNK_W) / CHUNK_W);
  const lastChunk = Math.ceil((cam.x + W + CHUNKS_AHEAD * CHUNK_W) / CHUNK_W);
  const chunks = [];
  for (let i = firstChunk; i <= lastChunk; i++) {
    chunks.push(generateChunk(i));
  }
  return chunks;
}

function getAllPlatforms() {
  const GY = H - GY_OFF;
  const chunks = getVisibleChunks();
  const plats = [];

  // Tutorial platforms
  if (!tutorialCompleted) {
    plats.push({x:-1000, y:GY, w:3000, h:GY_OFF, type:'ground'});
    plats.push({x:350, y:GY-130, w:120, h:12, type:'normal'});
    plats.push({x:700, y:GY-200, w:100, h:12, type:'normal'});
    plats.push({x:1050, y:GY-150, w:120, h:12, type:'normal'});
    return plats;
  }

  // Infinite ground (rendered separately but collision is chunks)
  for (const c of chunks) {
    // Ground segments (around null zones)
    let curX = c.baseX;
    const sorted = [...c.nullZones].sort((a,b)=>a.x-b.x);
    for (const nz of sorted) {
      if (nz.x > curX) plats.push({x:curX, y:GY, w:nz.x-curX, h:GY_OFF, type:'ground'});
      curX = nz.x + nz.w;
    }
    plats.push({x:curX, y:GY, w:c.baseX+CHUNK_W-curX, h:GY_OFF, type:'ground'});

    // Chunk platforms (normal + variable controlled)
    for (const p of c.platforms) plats.push({...p, type:p.type || 'normal'});
  }

  // Memory blocks
  for (const m of memBlocks) plats.push({...m, type:'memblock'});

  return plats;
}

function getAllObstacles() {
  if (!tutorialCompleted) return tutorialObstacles;
  const chunks = getVisibleChunks();
  const obs = [];
  for (const c of chunks) for (const o of c.obstacles) obs.push(o);
  return obs;
}

function getAllNullZones() {
  if (!tutorialCompleted) return [];
  const chunks = getVisibleChunks();
  const nzs = [];
  for (const c of chunks) for (const nz of c.nullZones) nzs.push(nz);
  return nzs;
}

function isInNullZone(x, w) {
  for (const nz of getAllNullZones()) {
    if (x+w > nz.x && x < nz.x+nz.w) return nz;
  }
  return null;
}

function resolveCollision() {
  const GY = H - GY_OFF;
  player.onGround = false;

  for (const p of getAllPlatforms()) {
    if (p.type === 'ground') {
      if (isInNullZone(player.x, P_W)) continue;
    }
    const px=p.x, py=p.y, pw=p.w, ph=p.h;
    if (!rectsOverlap(player.x,player.y,P_W,P_H,px,py,pw,ph)) continue;

    const oL=(player.x+P_W)-px, oR=(px+pw)-player.x;
    const oT=(player.y+P_H)-py, oB=(py+ph)-player.y;
    const mo=Math.min(oL,oR,oT,oB);

    if (mo===oT && player.vy>=0) { player.y=py-P_H; player.vy=0; player.onGround=true; player.coyoteFrames=COYOTE; }
    else if (mo===oB && player.vy<0) { player.y=py+ph; player.vy=0; }
    else if (mo===oL) { player.x=px-P_W; player.vx=0; }
    else if (mo===oR) { player.x=px+pw; player.vx=0; }
  }

  // Gate collision (closed gates block player horizontally)
  if (tutorialCompleted) {
    for (const o of getAllObstacles()) {
      if (o.type !== 'gate' || o.open) continue;
      if (!rectsOverlap(player.x,player.y,P_W,P_H,o.x,o.y,o.w,o.h)) continue;
      const oL=(player.x+P_W)-o.x, oR=(o.x+o.w)-player.x;
      if (oL < oR) { player.x=o.x-P_W; } else { player.x=o.x+o.w; }
      player.vx=0;
    }
  }
}

function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function segmentHitsRect(x1, y1, x2, y2, r) {
  const minX = Math.min(x1, x2);
  const maxX = Math.max(x1, x2);
  const minY = Math.min(y1, y2);
  const maxY = Math.max(y1, y2);
  if (maxX < r.x || minX > r.x + r.w || maxY < r.y || minY > r.y + r.h) return false;
  const samples = 8;
  for (let i=0; i<=samples; i++) {
    const t = i / samples;
    const sx = x1 + (x2 - x1) * t;
    const sy = y1 + (y2 - y1) * t;
    if (sx >= r.x && sx <= r.x + r.w && sy >= r.y && sy <= r.y + r.h) return true;
  }
  return false;
}

function hasLineOfSightToPlayer(dbg) {
  const x1 = dbg.x + dbg.w / 2;
  const y1 = dbg.y + dbg.h / 2;
  const x2 = player.x + P_W / 2;
  const y2 = player.y + P_H / 2;

  // Dense solids (excluding ground) can block scans.
  for (const p of getAllPlatforms()) {
    if (p.type === 'ground') continue;
    if (segmentHitsRect(x1, y1, x2, y2, { x:p.x, y:p.y, w:p.w, h:p.h })) return false;
  }
  for (const o of getAllObstacles()) {
    if (o.type === 'gate' && !o.open) {
      if (segmentHitsRect(x1, y1, x2, y2, { x:o.x, y:o.y, w:o.w, h:o.h })) return false;
    }
  }
  return true;
}

// ═══════════════════════════════════════════════════
//  UPDATE PLAYER
// ═══════════════════════════════════════════════════
function levelUpInvisibility() {
  if (invisTier <= 0) {
    invisTier = 1;
    invisTimer = INVIS_DURATION;
    sfx.invis();
    spawnPart(player.x+P_W/2, player.y+P_H/2, PAL.purple, 18, 5);
    return;
  }

  invisTier = Math.min(3, invisTier + 1);
  invisTimer = INVIS_UPGRADE_DURATION;
  if (invisTier === 3) {
    for (const d of debuggers) {
      d.stunTimer = Math.max(d.stunTimer, 90);
      d.scanning = false;
      d.scanTimer = 0;
      d.lockTimer = 0;
    }
  }
  sfx.invis();
  spawnPart(player.x+P_W/2, player.y+P_H/2, PAL.purple, 22, 6);
}

function updateInvisibility() {
  if (invisTimer > 0) {
    invisTimer--;
    if (invisTimer === 0) {
      invisTier = 0;
      sfx.invisEnd();
      spawnPart(player.x+P_W/2, player.y+P_H/2, PAL.purple, 14, 4);
    }
  }
}

function returnFromWarp() {
  if (!warpState.active) return;
  sfx.warpRet();
  player.x = warpState.returnX;
  player.y = warpState.returnY;
  player.vx = 0;
  player.vy = 0;
  inFunctionZone = false;
  warpState.active = false;
  warpState.timer = 0;
  player.glitchTimer = 20;
  glitchIntensity = Math.max(glitchIntensity - 0.2, 0);
}

function updatePlayer() {
  if (player.nullTimer > 0) { player.nullTimer--; return; }
  if (player.invincible > 0) player.invincible--;
  if (player.dashCooldown > 0) player.dashCooldown--;

  updateInvisibility();

  if (warpState.active) {
    warpState.timer--;
    if (justPressed['KeyR'] || justPressed['KeyQ']) returnFromWarp();
    else if (warpState.timer <= 0) returnFromWarp();
  }

  // Defensive micro-action: short phase dash.
  if ((justPressed['ShiftLeft'] || justPressed['ShiftRight'] || justPressed['KeyE']) && player.dashTimer <= 0 && player.dashCooldown <= 0) {
    player.dashDir = (keys['ArrowLeft']||keys['KeyA']) ? -1 : ((keys['ArrowRight']||keys['KeyD']) ? 1 : player.facing);
    player.dashTimer = DASH_FRAMES;
    player.dashCooldown = DASH_COOLDOWN;
    player.invincible = Math.max(player.invincible, DASH_FRAMES + 6);
    tone(240,'square',0.12,0.15,480);
    spawnPart(player.x+P_W/2, player.y+P_H/2, PAL.cyan, 12, 6);
  }

  let targetVX = 0;
  if (keys['ArrowLeft']||keys['KeyA']) { targetVX=-MOVE_SPEED; player.facing=-1; }
  if (keys['ArrowRight']||keys['KeyD']) { targetVX=MOVE_SPEED; player.facing=1; }

  if (player.dashTimer > 0) {
    player.dashTimer--;
    player.vx = player.dashDir * DASH_SPEED;
    if (player.vy > 2) player.vy *= 0.8;
  } else {
    player.vx += (targetVX - player.vx) * 0.22;
  }

  // Tutorial tracking
  if (!tutorialCompleted) {
    if (Math.abs(player.vx) > 1) tutorialProgress.moved = true;
  }

  if (justPressed['Space']||justPressed['ArrowUp']||justPressed['KeyW'])
    player.jumpBuffer = JUMP_BUFFER;
  if (player.jumpBuffer>0) player.jumpBuffer--;

  if (player.jumpBuffer>0 && player.coyoteFrames>0) {
    player.vy = JUMP_FORCE;
    player.coyoteFrames = 0;
    player.jumpBuffer = 0;
    sfx.jump();
    spawnPart(player.x+P_W/2, player.y+P_H, PAL.cyan, 5, 2.5);
    if (!tutorialCompleted) tutorialProgress.jumped = true;
  }

  const apexFactor = (player.vy<0 && !keys['Space'] && !keys['ArrowUp'] && !keys['KeyW']) ? 1.5 : 1;
  player.vy += GRAVITY * apexFactor;
  player.vy = Math.min(player.vy, 22);

  player.x += player.vx;
  player.y += player.vy;

  resolveCollision();

  if (player.onGround) player.coyoteFrames = COYOTE;
  else if (player.coyoteFrames>0) player.coyoteFrames--;

  addTrail(player.x+P_W/2, player.y+P_H/2);
  if (player.glitchTimer>0) player.glitchTimer--;
  if (Math.random()<0.004+corruption*0.0001) player.glitchTimer=5;

  // Null zone check
  const GY = H - GY_OFF;
  if (nullCooldown > 0) { nullCooldown--; }
  else if (player.y > GY + 25) {
    const nz = isInNullZone(player.x + P_W/2, 1);
    if (nz || !tutorialCompleted) {
      player.nullTimer = 90;
      player.nullVisible = false;
      if (tutorialCompleted) corruption = Math.max(0, corruption - 5);
      player.glitchTimer = 90;
      glitchIntensity = Math.min(glitchIntensity+0.6,1);
      spawnPart(player.x+P_W/2, player.y, PAL.purple, 15, 4);
      const respX = nz ? (player.x < nz.x+nz.w/2 ? nz.x-P_W-5 : nz.x+nz.w+5) : Math.max(player.x, 100);
      setTimeout(() => {
        player.x = respX; player.y = GY-P_H-2;
        player.vx=0; player.vy=0; player.nullVisible=true; nullCooldown=60;
        glitchIntensity=Math.max(glitchIntensity-0.3,0);
      }, 90*(1000/60));
    } else {
      player.x = Math.max(player.x, 0);
      player.y = GY - P_H - 2;
      player.vx=0; player.vy=0;
    }
  }
}

// ═══════════════════════════════════════════════════
//  OBSTACLE INTERACTIONS
// ═══════════════════════════════════════════════════
function applyVariablePlatformLinks(variableObstacle) {
  for (const ch of worldChunks.values()) {
    for (const p of ch.platforms) {
      if (p.type !== 'varplat' || p.controllerId !== variableObstacle.id) continue;
      const mapped = p.map?.[variableObstacle.value];
      if (typeof mapped === 'number') {
        p.y = mapped;
      }
    }
  }
}

function updateObstacles() {
  const obs = getAllObstacles();

  for (const o of obs) {
    if (o.type === 'variable') {
      const overlapping = rectsOverlap(player.x,player.y,P_W,P_H,o.x,o.y,o.w,o.h);
      if (overlapping && !o._touching) {
        o._touching = true; o._debounce = 0;
      } else if (!overlapping) {
        o._touching = false; o._debounce = -1;
      }
      if (o._touching && o._debounce === 0) {
        o._debounce = 30;
        o.value = o.value < o.max ? o.value+1 : o.min;
        applyVariablePlatformLinks(o);
        sfx.variable();
        spawnPart(o.x+o.w/2, o.y+o.h/2, o.col, 12, 4);
        player.glitchTimer = 10;
        registerComboEvent('variable');
        advanceRunGoal('variables', 1);
        addHeat(4);
        if (!o.used) {
          addCorruption(8);
          o.used = true;
          varChangedCount++;
          if (varChangedCount % 4 === 0) spawnMemLeak();
        }
        if (!tutorialCompleted && o.id === 'tut_var') tutorialProgress.variable = true;
        if (!tutorialCompleted && o._tutStep === 2) checkTutorialAdvance();
      }
    } else if (o.type === 'loop') {
      if (o.broken) continue;
      o.pulseT = (o.pulseT||0)+1;
      const inLoop = rectsOverlap(player.x,player.y,P_W,P_H,o.x,o.y,o.w,o.h);
      if (inLoop) {
        o.entered = true;
        // Loop acts as a jail until broken.
        const pad = 4;
        if (player.x < o.x + pad) { player.x = o.x + pad; player.vx = Math.max(0, player.vx); }
        if (player.x + P_W > o.x + o.w - pad) { player.x = o.x + o.w - P_W - pad; player.vx = Math.min(0, player.vx); }
        if (player.y < o.y + pad) { player.y = o.y + pad; player.vy = Math.max(0, player.vy); }
        if (player.y + P_H > o.y + o.h - pad) {
          player.y = o.y + o.h - P_H - pad;
          player.vy = 0;
          player.onGround = true;
          player.coyoteFrames = COYOTE;
        }
      }

      // Escape condition: jump in the middle core of the loop.
      const coreHB = { x:o.x + o.w/2 - 22, y:o.y + o.h/2 - 34, w:44, h:68 };
      if (inLoop && rectsOverlap(player.x,player.y,P_W,P_H,coreHB.x,coreHB.y,coreHB.w,coreHB.h)) {
        o.wireGlow = Math.min((o.wireGlow||0)+0.1,1);
        if (player.vy<-2 || justPressed['Space']||justPressed['ArrowUp']) {
          o.broken = true;
          o.entered = false;
          sfx.loopBreak();
          const cx = o.x + o.w/2;
          const cy = o.y + o.h/2;
          spawnPart(cx, cy, PAL.red, 25, 7);
          spawnPart(cx, cy, PAL.yellow, 10, 4);
          addCorruption(12);
          registerComboEvent('loop');
          advanceRunGoal('loops', 1);
          addHeat(8);
          player.glitchTimer = 22;
          glitchIntensity = Math.min(glitchIntensity+0.45,1);
          if (!tutorialCompleted) { tutorialProgress.loop = true; checkTutorialAdvance(); }
        }
      } else if (inLoop) {
        o.wireGlow = Math.max((o.wireGlow||0)-0.05,0);
      }
    } else if (o.type === 'warp') {
      o.pulseT++;
      const onPad = rectsOverlap(player.x,player.y+P_H-4,P_W,4,o.x,o.y,o.w,o.h);
      if (onPad && !warpState.active) {
        if (!o._onPad) {
          o._onPad = true;
          o._charge = 16;
        } else {
          o._charge--;
          if (o._charge <= 0) {
            sfx.warp();
            player.glitchTimer = 30;
            functionReturnX = player.x;
            functionReturnY = player.y;
            player.x = (typeof o._destX === 'number') ? o._destX : (o.x + o.destDx);
            inFunctionZone = true;
            warpState.active = true;
            warpState.returnX = functionReturnX;
            warpState.returnY = functionReturnY;
            warpState.timer = WARP_MAX_FRAMES;
            glitchIntensity = Math.min(glitchIntensity+0.35,1);
            if (!o.used) { addCorruption(8); o.used=true; }
            registerComboEvent('warp');
            advanceRunGoal('warps', 1);
            addHeat(6);
            if (!tutorialCompleted) { tutorialProgress.warp=true; checkTutorialAdvance(); }
            o._onPad = false;
          }
        }
      } else {
        o._onPad = false;
        o._charge = 0;
      }
    } else if (o.type === 'gate') {
      // Gate opens if player has interacted enough nearby (corruption-based) OR jumps over
      if (!o.open) {
        const dist = Math.abs(player.x - (o.x + o.w/2));
        // Open gate if player is close and has decent corruption, or if player jumps over it
        if (dist < 300 && corruption > 30) {
          o.open = true;
          sfx.variable && sfx.variable();
          spawnPart(o.x+o.w/2, o.y+o.h/2, o.col, 15, 4);
          addCorruption(6);
        }
      }
    }
  }
}

function checkTutorialAdvance() {
  const allDone = TUT_STEPS.every(s=>s.done());
  if (allDone && !tutorialCompleted && !tutorialAdvancePending) {
    tutorialAdvancePending = true;
    tutCompleteFlash = 90;
    setTimeout(()=>{
      startInfiniteRun();
      tutorialAdvancePending = false;
    }, 400);
  }
}

function startInfiniteRun(options = {}) {
  const preservePlayerPos = options.preservePlayerPos !== false;
  const playCelebrateFx = options.playCelebrateFx !== false;

  tutorialCompleted = true;
  isPaused = false;
  gameState = 'playing';
  corruption = 0;
  multiplier = 1;
  multiplierTimer = 0;
  invisTimer = 0;
  invisTier = 0;
  memBlocks = [];
  varChangedCount = 0;
  deathTimer = 0;
  corruptionRateTimer = 0;
  worldChunks.clear();
  inFunctionZone = false;
  warpState = { active:false, returnX:0, returnY:0, timer:0 };
  tutorialAdvancePending = false;
  resetRunDirectorState();
  goalToast = '';
  goalToastTimer = 0;

  if (!preservePlayerPos) {
    cam.x = 0;
    cam.tx = 0;
    initPlayer();
  }

  // Pre-generate nearby chunks so obstacles/coins/powerups exist immediately.
  const startChunk = Math.floor(player.x / CHUNK_W);
  for (let i = startChunk - CHUNKS_BEHIND; i <= startChunk + CHUNKS_AHEAD; i++) {
    generateChunk(i);
  }

  // Make threat/gameplay start instantly instead of waiting for the first timer spawn.
  initDebuggers();
  spawnDebugger();

  if (playCelebrateFx) {
    sfx.win && sfx.win();
    spawnPart(player.x+P_W/2, player.y+P_H/2, PAL.cyan, 30, 6);
    spawnPart(player.x+P_W/2, player.y+P_H/2, PAL.yellow, 20, 4);
  }
}

function spawnMemLeak() {
  const GY = H - GY_OFF;
  if (memBlocks.length > 8) return;
  memBlocks.push({
    x: player.x + 250 + Math.random()*200,
    y: GY - 90, w:55, h:70,
    type:'memblock', alpha:0.5,
  });
}

// Coins & powerups
function updatePickups() {
  if (!tutorialCompleted) return;
  const chunks = getVisibleChunks();

  for (const c of chunks) {
    // Coins
    for (const coin of c.coins) {
      if (coin.collected) continue;
      coin.pulseT++;
      if (rectsOverlap(player.x,player.y,P_W,P_H,coin.x-8,coin.y-8,16,16)) {
        coin.collected = true;
        sfx.coin();
        multiplier = Math.min(multiplier + 0.5, 5);
        multiplierTimer = 300; // 5 seconds
        spawnPart(coin.x, coin.y, PAL.yellow, 10, 3);
        sfx.multiplier();
        registerComboEvent('coin');
        advanceRunGoal('coins', 1);
        addHeat(3);
      }
    }
    // Powerups
    for (const pu of c.powerups) {
      if (pu.collected) continue;
      pu.pulseT++;
      if (rectsOverlap(player.x,player.y,P_W,P_H,pu.x-12,pu.y-12,24,24)) {
        pu.collected = true;
        levelUpInvisibility();
        spawnPart(pu.x, pu.y, PAL.purple, 15, 4);
        addHeat(2);
      }
    }
  }

  if (multiplierTimer > 0) {
    multiplierTimer--;
    if (multiplierTimer === 0) multiplier = 1;
  }
}

function addCorruption(amount) {
  if (!tutorialCompleted) return;
  const gained = amount * multiplier * getComboBonusMultiplier();
  corruption += gained;
  addHeat(Math.min(4, amount * 0.18));
  if (corruption > highScore) highScore = corruption;
  spawnPart(player.x+P_W/2, player.y, PAL.cyan, 4, 2);
}

// Passive corruption gain
function updateCorruptionPassive() {
  if (!tutorialCompleted) return;
  corruptionRateTimer++;
  if (corruptionRateTimer % 60 === 0) {
    // +1 per second just for staying alive; scales very slightly
    addCorruption(1);
    lastCorruption = corruption;
  }
}

// ═══════════════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════════════
function triggerGameOver() {
  isPaused = false;
  warpState.active = false;
  sfx.gameover();
  gameState = 'gameover';
  deathTimer = 0;
  glitchIntensity = 1;
  if (corruption > highScore) highScore = corruption;
}

function restartGame() {
  glitchIntensity = 0;
  tipTimer = 0;
  currentTip = 0;
  if (tutorialSeen) {
    startInfiniteRun({ preservePlayerPos: false, playCelebrateFx: false });
  } else {
    startTutorial();
  }
}

// ═══════════════════════════════════════════════════
//  BACKGROUNDS
// ═══════════════════════════════════════════════════
function drawBackground() {
  // Deep sky gradient
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#030312');
  grad.addColorStop(0.6, '#080820');
  grad.addColorStop(1, '#0d0820');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);


  
  // Stars
  ctx.save();
  for (let i=0; i<80; i++) {
    const sx = ((i*137.5 + cam.x*0.02) % (W+100));
    const sy = (i*97.3) % (H*0.55);
    const pulse = 0.3 + 0.7*Math.abs(Math.sin(frame*0.01+i));
    ctx.globalAlpha = pulse * 0.6;
    ctx.fillStyle = i%5===0 ? PAL.cyan : PAL.white;
    ctx.fillRect(sx, sy, i%7===0?2:1, i%7===0?2:1);
  }
  ctx.restore();

  // Parallax buildings - cyberpunk skyline
  const buildLayers = [
    { speed:0.03, alpha:0.2, minH:100, maxH:250, w:60, gap:25, col:PAL.buildingA, win:PAL.purple },
    { speed:0.12, alpha:0.35, minH:80,  maxH:200, w:45, gap:18, col:PAL.buildingB, win:PAL.cyan },
    { speed:0.35, alpha:0.55, minH:60,  maxH:160, w:35, gap:12, col:'#0a0a1a',     win:PAL.neonA },
  ];

  for (const layer of buildLayers) {
    ctx.save();
    const off = cam.x * layer.speed;
    const totalW = layer.w + layer.gap;
    const startX = -((off % totalW) + totalW);
    let seed = Math.floor(off / totalW) * 7919;
    const sr = ()=>{ seed=(seed*1664525+1013904223)>>>0; return seed/0x100000000; };

    let bx = startX;
    while (bx < W + totalW) {
      const bh = layer.minH + sr()*(layer.maxH-layer.minH);
      const by = H - GY_OFF - bh;
      ctx.globalAlpha = layer.alpha;
      ctx.fillStyle = layer.col;
      ctx.fillRect(bx, by, layer.w, bh);

      // Neon edge on buildings
      ctx.globalAlpha = layer.alpha * 0.8;
      ctx.strokeStyle = layer.win;
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx+layer.w, by); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by+bh); ctx.stroke();

      // Windows
      ctx.fillStyle = layer.win;
      for (let wy=by+10; wy<by+bh-12; wy+=14) {
        for (let wx=bx+6; wx<bx+layer.w-6; wx+=10) {
          if (sr()>0.45) {
            const blink = sr()>0.98 ? (frame%60<30?0:1) : 1;
            ctx.globalAlpha = blink * layer.alpha * 0.7;
            ctx.fillRect(wx, wy, 5, 4);
          }
        }
      }
      bx += totalW; seed++;
    }
    ctx.restore();
  }

  // Scanlines overlay
  ctx.save();
  ctx.globalAlpha = 0.035;
  ctx.fillStyle = '#000';
  for (let y=0; y<H; y+=3) ctx.fillRect(0,y,W,1);
  ctx.restore();

  // Occasional color flicker
  if (frame%200===0 && Math.random()<0.3) {
    ctx.save();
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = PAL.red;
    ctx.fillRect(0, Math.random()*H, W, 2);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════
//  DRAW WORLD
// ═══════════════════════════════════════════════════
function glow(col,blur) { ctx.shadowColor=col; ctx.shadowBlur=blur; }
function noGlow() { ctx.shadowBlur=0; }

function drawGround() {
  const GY = H - GY_OFF;
  const cx = cam.x;

  if (!tutorialCompleted) {
    // Tutorial fixed ground
    ctx.save();
    glow(PAL.cyan, 10);
    ctx.fillStyle = PAL.groundFill;
    ctx.fillRect(-200-cx, GY, 4000, GY_OFF);
    ctx.strokeStyle = PAL.cyan;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-200-cx, GY); ctx.lineTo(3000-cx, GY); ctx.stroke();
    noGlow();
    ctx.restore();
    return;
  }

  const chunks = getVisibleChunks();
  ctx.save();
  for (const c of chunks) {
    let curX = c.baseX;
    const sorted = [...c.nullZones].sort((a,b)=>a.x-b.x);
    for (const nz of sorted) {
      if (nz.x > curX) {
        const sx=curX-cx, sw=nz.x-curX;
        // Ground fill
        glow(PAL.cyan, 8);
        ctx.fillStyle = PAL.groundFill;
        ctx.fillRect(sx, GY, sw, GY_OFF);
        // Top glow line
        ctx.strokeStyle = PAL.cyan;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(sx, GY); ctx.lineTo(sx+sw, GY); ctx.stroke();
        // Grid texture
        ctx.globalAlpha = 0.1;
        ctx.strokeStyle = PAL.cyanDim;
        ctx.lineWidth = 0.5;
        for (let gx=curX; gx<nz.x; gx+=40) {
          ctx.beginPath(); ctx.moveTo(gx-cx, GY); ctx.lineTo(gx-cx, GY+GY_OFF); ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
      // Null zone void
      drawNullZone(nz.x-cx, nz.w, GY);
      curX = nz.x + nz.w;
    }
    // Remainder
    const sx=curX-cx, sw=c.baseX+CHUNK_W-curX;
    if (sw>0) {
      glow(PAL.cyan, 8);
      ctx.fillStyle = PAL.groundFill;
      ctx.fillRect(sx, GY, sw, GY_OFF);
      ctx.strokeStyle = PAL.cyan;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(sx, GY); ctx.lineTo(sx+sw, GY); ctx.stroke();
      ctx.globalAlpha = 0.1;
      ctx.strokeStyle = PAL.cyanDim;
      ctx.lineWidth = 0.5;
      for (let gx=curX; gx<c.baseX+CHUNK_W; gx+=40) {
        ctx.beginPath(); ctx.moveTo(gx-cx, GY); ctx.lineTo(gx-cx, GY+GY_OFF); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
  }
  noGlow();
  ctx.restore();
}

function drawNullZone(sx, nzW, GY) {
  // Black void
  ctx.globalAlpha = 1;
  noGlow();
  ctx.fillStyle = '#000005';
  ctx.fillRect(sx, GY, nzW, GY_OFF);

  // Grid lines
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.strokeStyle = PAL.purpleDim;
  ctx.lineWidth = 0.5;
  for (let gx=0; gx<nzW; gx+=16) {
    ctx.beginPath(); ctx.moveTo(sx+gx, GY); ctx.lineTo(sx+gx, GY+GY_OFF); ctx.stroke();
  }
  for (let gy=0; gy<GY_OFF; gy+=16) {
    ctx.beginPath(); ctx.moveTo(sx, GY+gy); ctx.lineTo(sx+nzW, GY+gy); ctx.stroke();
  }
  ctx.restore();

  // Edges glow
  glow(PAL.purple, 8);
  ctx.strokeStyle = PAL.purpleDim;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(sx, GY); ctx.lineTo(sx, GY+GY_OFF); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx+nzW, GY); ctx.lineTo(sx+nzW, GY+GY_OFF); ctx.stroke();
  noGlow();

  // Label
  ctx.fillStyle = PAL.purpleDim;
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('null', sx+nzW/2, GY+30);
  ctx.textAlign = 'left';
}

function drawPlatforms() {
  const cx = cam.x;
  const plats = getAllPlatforms();
  for (const p of plats) {
    if (p.type==='ground') continue; // drawn separately
    const sx=p.x-cx;
    if (sx > W+100 || sx+p.w<-100) continue;

    ctx.save();
    if (p.type==='normal') {
      glow(PAL.cyan, 14);
      ctx.fillStyle = PAL.groundFill;
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.strokeStyle = PAL.cyan;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(sx, p.y, p.w, p.h);
      // Top highlight
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = PAL.neonB;
      ctx.fillRect(sx+2, p.y, p.w-4, 2);
    } else if (p.type==='varplat') {
      glow(PAL.yellow, 16);
      ctx.fillStyle = '#1a1604';
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.strokeStyle = PAL.yellow;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(sx, p.y, p.w, p.h);
      ctx.globalAlpha = 0.75;
      ctx.fillStyle = '#fff0a0';
      ctx.fillRect(sx+2, p.y, p.w-4, 2);
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = PAL.yellow;
      ctx.font = '8px Courier New';
      ctx.fillText('var-link', sx+4, p.y-4);
    } else if (p.type==='memblock') {
      ctx.globalAlpha = p.alpha||0.5;
      glow(PAL.red, 12);
      ctx.fillStyle = '#1a001a';
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.strokeStyle = PAL.red;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = PAL.red;
      ctx.font = '9px Courier New';
      ctx.globalAlpha = (p.alpha||0.5) * 0.9;
      ctx.fillText('LEAK', sx+6, p.y+p.h/2+3);
    }
    noGlow();
    ctx.restore();
  }
}

function drawObstacles() {
  const cx = cam.x;
  const obs = getAllObstacles();

  for (const o of obs) {
    const sx = o.x - cx;
    if (sx > W+200 || sx+200 < -200) continue;
    ctx.save();

    if (o.type==='variable') {
      const pulse = 0.65+0.35*Math.sin(frame*0.07+(o.x*0.01));
      glow(o.col, 22*pulse);
      ctx.strokeStyle = o.col;
      ctx.lineWidth = 2;
      ctx.fillStyle = o.col+'18';
      ctx.fillRect(sx, o.y, o.w, o.h);
      ctx.strokeRect(sx, o.y, o.w, o.h);
      // Corner brackets (cyber aesthetic)
      ctx.lineWidth = 2;
      ctx.strokeStyle = o.col;
      [[0,0],[o.w-8,0],[0,o.h-8],[o.w-8,o.h-8]].forEach(([bx,by])=>{
        ctx.beginPath();
        ctx.moveTo(sx+bx+(bx===0?0:8), o.y+by);
        ctx.lineTo(sx+bx, o.y+by);
        ctx.lineTo(sx+bx, o.y+by+(by===0?8:0));
        ctx.stroke();
      });
      ctx.fillStyle = o.col;
      ctx.font = 'bold 12px Courier New';
      ctx.fillText(`${o.lbl} = ${o.value}`, sx+10, o.y+20);
      if (!o.used) {
        ctx.globalAlpha = 0.55+0.45*Math.sin(frame*0.12);
        ctx.font = '9px Courier New';
        ctx.fillText('▶ walk in', sx+10, o.y-7);
      }

    } else if (o.type==='loop') {
      if (o.broken) {
        // Show broken state faintly
        ctx.globalAlpha = 0.15;
        ctx.strokeStyle = PAL.neonA;
        ctx.lineWidth = 1;
        ctx.setLineDash([4,8]);
        ctx.strokeRect(sx, o.y, o.w, o.h);
        ctx.setLineDash([]);
        ctx.restore();
        continue;
      }
      const dashOff = (frame * 1.5) % 24;
      glow(PAL.neonA, 16);
      ctx.strokeStyle = PAL.neonA;
      ctx.lineWidth = 2;
      ctx.setLineDash([9,6]);
      ctx.lineDashOffset = -dashOff;
      ctx.strokeRect(sx, o.y, o.w, o.h);
      ctx.setLineDash([]);
      ctx.fillStyle = PAL.neonA+'0a';
      ctx.fillRect(sx, o.y, o.w, o.h);

      // Label
      ctx.fillStyle = PAL.neonA;
      ctx.globalAlpha = 0.7;
      ctx.font = 'bold 10px Courier New';
      ctx.fillText('for(;;)', sx+8, o.y+16);
      ctx.globalAlpha = 1;

      // Loop core (jump here to break).
      const coreX = sx + o.w / 2;
      const coreY = o.y + o.h / 2;
      const coreGlow = 18 + 14 * Math.sin(frame * 0.16) + (o.wireGlow || 0) * 20;
      glow(PAL.red, coreGlow);
      ctx.strokeStyle = PAL.red;
      ctx.lineWidth = 2;
      ctx.setLineDash([4,3]);
      ctx.strokeRect(coreX - 22, coreY - 34, 44, 68);
      ctx.setLineDash([]);
      ctx.fillStyle = PAL.red+'33';
      ctx.fillRect(coreX - 16, coreY - 26, 32, 52);
      ctx.fillStyle = PAL.white;
      ctx.beginPath(); ctx.arc(coreX, coreY, 4, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.65 + 0.35 * Math.sin(frame * 0.18);
      ctx.fillStyle = PAL.red;
      ctx.font = '9px Courier New';
      ctx.fillText('JUMP CORE', coreX - 28, coreY + 46);

    } else if (o.type==='warp') {
      const pulse = 0.5+0.5*Math.sin((o.pulseT||0)*0.09);

      // Source pad
      glow(PAL.purple, 28*pulse);
      ctx.fillStyle = PAL.purple+'25';
      ctx.fillRect(sx, o.y, o.w, o.h);
      ctx.strokeStyle = PAL.purple;
      ctx.lineWidth = 2;
      ctx.strokeRect(sx, o.y, o.w, o.h);
      ctx.fillStyle = PAL.purple;
      ctx.font = 'bold 13px Courier New';
      ctx.fillText('ƒ()', sx+3, o.y+26);
      const destSX = (o._destX||o.x+o.destDx) - cam.x;

      // Destination pad
      const destPulse = 0.5+0.5*Math.sin((o.pulseT||0)*0.09+Math.PI);
      glow(PAL.warpDest, 16*destPulse);
      ctx.fillStyle = PAL.warpDest+'15';
      ctx.fillRect(destSX, o.y, o.w, o.h);
      ctx.strokeStyle = PAL.warpDest;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(destSX, o.y, o.w, o.h);
      ctx.fillStyle = PAL.warpDest;
      ctx.beginPath();
      ctx.arc(destSX + o.w/2, o.y + o.h/2, 3, 0, Math.PI*2);
      ctx.fill();

    } else if (o.type==='gate') {
      if (o.open) {
        ctx.globalAlpha=0.15; ctx.strokeStyle=o.col; ctx.lineWidth=1;
        ctx.strokeRect(sx, o.y, o.w, o.h);
        ctx.restore(); continue;
      }
      glow(o.col, 20);
      ctx.fillStyle = o.col+'30';
      ctx.fillRect(sx, o.y, o.w, o.h);
      ctx.strokeStyle = o.col;
      ctx.lineWidth = 2.5;
      ctx.strokeRect(sx, o.y, o.w, o.h);
      ctx.fillStyle = o.col;
      ctx.font = '9px Courier New';
      ctx.save();
      ctx.translate(sx+o.w/2, o.y+o.h/2);
      ctx.rotate(-Math.PI/2);
      ctx.fillText(o.lbl||'GATE', -20, 4);
      ctx.restore();
    }

    noGlow();
    ctx.restore();
  }
}

function drawCoins() {
  if (!tutorialCompleted) return;
  const cx = cam.x;
  const chunks = getVisibleChunks();
  for (const c of chunks) {
    for (const coin of c.coins) {
      if (coin.collected) continue;
      const sx = coin.x - cx;
      coin.pulseT++;
      const pulse = 0.6+0.4*Math.sin(coin.pulseT*0.12);
      const bob = Math.sin(coin.pulseT*0.08)*4;
      ctx.save();
      glow(PAL.yellow, 18*pulse);
      ctx.fillStyle = PAL.yellow;
      ctx.beginPath(); ctx.arc(sx, coin.y+bob, 7, 0, Math.PI*2); ctx.fill();
      // Inner
      ctx.fillStyle = '#fff8a0';
      ctx.beginPath(); ctx.arc(sx-2, coin.y+bob-2, 3, 0, Math.PI*2); ctx.fill();
      // x multiplier label
      ctx.fillStyle = PAL.yellow;
      ctx.font = '8px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('×M', sx, coin.y+bob-12);
      ctx.textAlign = 'left';
      noGlow();
      ctx.restore();
    }
    // Powerups
    for (const pu of c.powerups) {
      if (pu.collected) continue;
      const sx = pu.x - cx;
      pu.pulseT++;
      const pulse = 0.5+0.5*Math.sin(pu.pulseT*0.1);
      const bob = Math.sin(pu.pulseT*0.07)*5;
      ctx.save();
      glow(PAL.purple, 28*pulse);
      // Hexagon shape
      ctx.fillStyle = PAL.purpleDim;
      ctx.strokeStyle = PAL.purple;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i=0;i<6;i++) {
        const a = (Math.PI/3)*i - Math.PI/6;
        const r = 11;
        i===0 ? ctx.moveTo(sx+Math.cos(a)*r, pu.y+bob+Math.sin(a)*r)
              : ctx.lineTo(sx+Math.cos(a)*r, pu.y+bob+Math.sin(a)*r);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = PAL.purple;
      ctx.font = 'bold 10px Courier New';
      ctx.textAlign='center';
      ctx.fillText('👁', sx, pu.y+bob+4);
      ctx.font='8px Courier New';
      ctx.fillStyle=PAL.white;
      ctx.fillText('INVIS', sx, pu.y+bob-15);
      ctx.textAlign='left';
      noGlow();
      ctx.restore();
    }
  }
}

function drawTrail() {
  const cx = cam.x;
  const isInvis = invisTimer > 0;
  ctx.save();
  for (const t of trail) {
    if (t.life<=0) continue;
    const col = isInvis ? PAL.purple : PAL.cyan;
    ctx.globalAlpha = t.life * (isInvis ? 0.15 : 0.35);
    ctx.fillStyle = col;
    ctx.shadowColor = col;
    ctx.shadowBlur = 4;
    ctx.fillRect(t.x-cx-2, t.y-2, 4, 4);
  }
  noGlow();
  ctx.restore();
}

function drawParticles() {
  const cx = cam.x;
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha = p.life*0.9;
    ctx.shadowColor = p.col; ctx.shadowBlur = 8;
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x-cx-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  noGlow();
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  DRAW PLAYER — Cyberpunk aesthetic
// ═══════════════════════════════════════════════════
function drawPlayer() {
  if (!player.nullVisible) {
    if (frame%8<4) {
      ctx.save(); ctx.globalAlpha=0.3; ctx.fillStyle=PAL.purple;
      ctx.fillRect(player.x-cam.x-8, player.y-4, P_W+16, P_H+8);
      ctx.restore();
    }
    return;
  }

  const sx = player.x - cam.x;
  const sy = player.y;
  const isGlitch = player.glitchTimer > 0;
  const isInvis = invisTimer > 0;
  const alpha = isInvis ? (0.25 + 0.15*Math.sin(frame*0.3)) : 1;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Chromatic aberration
  if (isGlitch && frame%2===0) {
    const off = Math.min(player.glitchTimer*0.6, 7);
    ctx.globalAlpha = alpha * 0.35;
    ctx.fillStyle = PAL.red;
    ctx.fillRect(sx-off, sy, P_W, P_H);
    ctx.fillStyle = PAL.cyan;
    ctx.fillRect(sx+off, sy, P_W, P_H);
    ctx.globalAlpha = alpha;
  }

  // Invis shimmer
  if (isInvis) {
    glow(PAL.purple, 20);
    ctx.strokeStyle = PAL.purple;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(sx-1, sy-1, P_W+2, P_H+2);
  }

  // Body — pixel-art cyberpunk character
  // Main body
  const bodyCol = isInvis ? PAL.purple : (isGlitch ? PAL.cyan : PAL.white);
  glow(bodyCol, isInvis ? 15 : (isGlitch ? 20 : 14));

  // Torso
  ctx.fillStyle = isInvis ? '#1a0030' : '#1a1a3a';
  ctx.fillRect(sx+1, sy+6, P_W-2, P_H-6);

  // Jacket/chest (red — Edgerunners jacket)
  ctx.fillStyle = isInvis ? PAL.purple : PAL.red;
  ctx.fillRect(sx+2, sy+7, P_W-4, 7);
  // Jacket lines
  ctx.fillStyle = '#000';
  ctx.fillRect(sx+P_W/2-1, sy+7, 1, 7);

  // Head
  ctx.fillStyle = isInvis ? '#2a0040' : '#e8d0b0';
  ctx.fillRect(sx+2, sy, P_W-4, 7);

  // Hair (cyan/neon — Lucy style)
  ctx.fillStyle = isInvis ? PAL.purple : PAL.cyan;
  ctx.fillRect(sx+2, sy, P_W-4, 3);

  // Eyes (red pupils — cybernetic)
  ctx.fillStyle = isInvis ? PAL.purple : PAL.red;
  const eyeOff = player.facing > 0 ? 1 : -1;
  ctx.fillRect(sx+3+eyeOff, sy+4, 2, 2);
  ctx.fillRect(sx+8+eyeOff, sy+4, 2, 2);

  // Eye glow
  glow(PAL.red, 8);
  ctx.fillStyle = PAL.red;
  ctx.fillRect(sx+3+eyeOff, sy+4, 2, 2);
  ctx.fillRect(sx+8+eyeOff, sy+4, 2, 2);

  // Legs
  if (Math.abs(player.vx)>0.5 && player.onGround) {
    const legSwing = Math.sin(frame*0.4)*3;
    ctx.fillStyle = '#2a2a4a';
    ctx.fillRect(sx+2, sy+P_H, 4, 4+legSwing);
    ctx.fillRect(sx+P_W-6, sy+P_H, 4, 4-legSwing);
    // Boots (red)
    ctx.fillStyle = PAL.red;
    ctx.fillRect(sx+2, sy+P_H+2+legSwing, 5, 2);
    ctx.fillRect(sx+P_W-6, sy+P_H+2-legSwing, 5, 2);
  } else {
    ctx.fillStyle = '#2a2a4a';
    ctx.fillRect(sx+2, sy+P_H, 4, 4);
    ctx.fillRect(sx+P_W-6, sy+P_H, 4, 4);
  }

  // Jump sparks
  if (!player.onGround && player.vy < -4) {
    ctx.globalAlpha = 0.5*alpha;
    ctx.fillStyle = PAL.cyan;
    ctx.fillRect(sx+4, sy+P_H, 2, 5);
    ctx.fillRect(sx+P_W-6, sy+P_H, 2, 5);
  }

  noGlow();
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  DRAW DEBUGGERS — Red drone/robot aesthetic
// ═══════════════════════════════════════════════════
function drawDebuggers() {
  const cx = cam.x;
  for (const d of debuggers) {
    const sx = d.x - cx;
    if (sx > W+100 || sx < -100) continue;
    const isStunned = d.stunTimer > 0;
    ctx.save();

    // Scan pulse circle
    if (d.scanning && !isStunned) {
      const scanFrames = getScanFramesNow();
      const t = d.scanTimer / scanFrames;
      const r = (d.scanRadius || SCAN_RADIUS) * (0.15+0.85*Math.min(t, 1));
      ctx.globalAlpha = 0.1+0.06*Math.sin(frame*0.3);
      glow(PAL.red, 30);
      ctx.fillStyle = PAL.red+'18';
      ctx.beginPath(); ctx.arc(sx+d.w/2, d.y+d.h/2, r, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = PAL.red;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(sx+d.w/2, d.y+d.h/2, r, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
      // Progress bar
      ctx.fillStyle = '#1a0000';
      ctx.fillRect(sx-8, d.y+d.h+5, 32, 3);
      ctx.fillStyle = PAL.red;
      ctx.fillRect(sx-8, d.y+d.h+5, 32*Math.min(t,1), 3);
      glow(PAL.red, 6);
      ctx.fillStyle = PAL.red;
      ctx.font = '8px Courier New';
      ctx.fillText(d.lockTimer > 0 ? 'LOCKING' : 'SCANNING', sx+d.w/2-22, d.y-8);

      if (d.lockTimer > 0) {
        ctx.globalAlpha = 0.45 + 0.35*Math.sin(frame*0.5);
        glow(PAL.yellow, 20);
        ctx.strokeStyle = PAL.yellow;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sx+d.w/2, d.y+d.h/2, r + 8, 0, Math.PI*2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    // Stunned effect
    if (isStunned) {
      ctx.globalAlpha = 0.3 + 0.2*Math.sin(frame*0.2);
      glow(PAL.purple, 10);
    }

    // Body — angular robot/drone
    const pulse = d.scanning ? 0.7+0.3*Math.sin(frame*0.3) : 1;
    const bodyCol = isStunned ? PAL.purpleDim : PAL.red;
    glow(bodyCol, 20*pulse*(isStunned?0.3:1));

    // Main chassis
    ctx.fillStyle = isStunned ? '#1a001a' : '#1a0000';
    ctx.fillRect(sx, d.y, d.w, d.h);

    // Red plating
    ctx.fillStyle = isStunned ? PAL.purpleDim : PAL.redDim;
    ctx.fillRect(sx+1, d.y+2, d.w-2, d.h-4);

    // Armor lines
    ctx.fillStyle = isStunned ? '#330044' : '#330000';
    ctx.fillRect(sx+1, d.y+d.h/2-1, d.w-2, 2);

    // Scanner eye
    const eyeX = d.dir > 0 ? sx+d.w-5 : sx+3;
    const eyeCol = isStunned ? PAL.purple : (d.scanning ? PAL.white : PAL.red);
    glow(eyeCol, d.scanning?20:12);
    ctx.fillStyle = eyeCol;
    ctx.beginPath(); ctx.arc(eyeX+1, d.y+6, d.scanning?4:3, 0, Math.PI*2); ctx.fill();

    // Scan beam
    if (d.scanning && !isStunned) {
      ctx.globalAlpha = 0.15+0.1*Math.sin(frame*0.4);
      ctx.fillStyle = PAL.red;
      const beamDir = d.dir > 0 ? 1 : -1;
      ctx.beginPath();
      ctx.moveTo(eyeX+1, d.y+6);
      ctx.lineTo(eyeX+1+beamDir*80, d.y+6-20);
      ctx.lineTo(eyeX+1+beamDir*80, d.y+6+20);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Label
    ctx.globalAlpha = isStunned ? 0.4 : 0.9;
    ctx.fillStyle = isStunned ? PAL.purple : PAL.red;
    ctx.font = 'bold 8px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(isStunned ? 'NULL' : 'DBG', sx+d.w/2, d.y-5);
    ctx.textAlign = 'left';

    noGlow();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════
function drawUI() {
  ctx.save();

  const minDist = debuggers.length > 0
    ? debuggers.reduce((acc,d)=>Math.min(acc, Math.hypot(player.x-d.x,player.y-d.y)), 99999)
    : 99999;
  const prox = Math.max(0, 1-minDist/700);
  const scanning = debuggers.some(d=>d.scanning);
  const dangerMode = scanning || prox > 0.5;

  // ── CORRUPTION SCORE (top left)
  const scoreStr = Math.round(corruption).toString().padStart(6,'0');
  ctx.textAlign = 'left';
  glow(PAL.red, 18);
  ctx.fillStyle = PAL.red;
  ctx.font = 'bold 28px Courier New';
  ctx.fillText(scoreStr, 20, 38);
  noGlow();
  ctx.fillStyle = PAL.redDim;
  ctx.font = '10px Courier New';
  ctx.fillText('CORRUPTION', 20, 50);

  // Highscore
  ctx.fillStyle = PAL.greyLight;
  ctx.font = '10px Courier New';
  ctx.fillText(`HI: ${Math.round(highScore).toString().padStart(6,'0')}`, 20, 65);

  // ── MULTIPLIER
  if (multiplierTimer > 0) {
    const mx = 20, my = 80;
    const pct = multiplierTimer / 300;
    ctx.fillStyle = PAL.yellow;
    glow(PAL.yellow, 14);
    ctx.font = 'bold 16px Courier New';
    ctx.fillText(`×${multiplier.toFixed(1)}`, mx, my+14);
    noGlow();
    // Timer bar
    ctx.fillStyle = '#2a2a00';
    ctx.fillRect(mx, my+18, 80, 4);
    ctx.fillStyle = PAL.yellow;
    ctx.fillRect(mx, my+18, 80*pct, 4);
  }

  // Show heat/combo only when relevant to reduce HUD overload.
  if (heatHudTimer > 0 || dangerMode) {
    ctx.fillStyle = '#190505';
    ctx.fillRect(20, 95, 130, 5);
    ctx.fillStyle = heat > 66 ? PAL.red : (heat > 33 ? PAL.yellow : PAL.cyan);
    ctx.fillRect(20, 95, 130 * (heat / 100), 5);
    ctx.fillStyle = PAL.greyLight;
    ctx.font = '9px Courier New';
    ctx.fillText(`HEAT ${Math.round(heat)}`, 20, 112);
  }

  if (comboTier > 0 || comboHudTimer > 0) {
    ctx.fillStyle = comboTier > 0 ? PAL.yellow : PAL.greyLight;
    ctx.font = '10px Courier New';
    ctx.fillText(`COMBO T${comboTier}  x${getComboBonusMultiplier().toFixed(2)}`, 20, 128);
    ctx.fillStyle = '#2a1d00';
    ctx.fillRect(20, 132, 120, 4);
    const chainPct = comboChainIndex / COMBO_SEQUENCE.length;
    ctx.fillStyle = PAL.yellow;
    ctx.fillRect(20, 132, 120 * chainPct, 4);
  }

  // ── INVISIBILITY STATUS (top right)
  ctx.textAlign = 'right';
  if (invisTier > 0 && invisTimer > 0) {
    const maxT = invisTier === 1 ? INVIS_DURATION : INVIS_UPGRADE_DURATION;
    const pct = invisTimer / maxT;
    glow(PAL.purple, 20);
    ctx.fillStyle = PAL.purple;
    ctx.font = 'bold 13px Courier New';
    ctx.fillText(`◉ INVIS T${invisTier}`, W-20, 28);
    noGlow();
    ctx.fillStyle = '#1a001a';
    ctx.fillRect(W-180, 34, 160, 6);
    glow(PAL.purple, 8);
    ctx.fillStyle = PAL.purple;
    ctx.fillRect(W-180, 34, 160*pct, 6);
    noGlow();
    const secs = Math.ceil(invisTimer/60);
    ctx.fillStyle = PAL.purple;
    ctx.font = '10px Courier New';
    ctx.fillText(`${secs}s remaining`, W-20, 52);
  } else {
    ctx.fillStyle = PAL.greyLight;
    ctx.font = '10px Courier New';
    ctx.fillText('collect INVIS to cloak', W-20, 28);
  }

  // Dash cooldown
  const dashPct = player.dashCooldown > 0 ? (1 - player.dashCooldown / DASH_COOLDOWN) : 1;
  ctx.fillStyle = PAL.cyan;
  ctx.font = '10px Courier New';
  ctx.fillText(player.dashCooldown > 0 ? `DASH ${(player.dashCooldown/60).toFixed(1)}s` : 'DASH READY', W-20, 66);
  ctx.fillStyle = '#001018';
  ctx.fillRect(W-180, 70, 160, 5);
  ctx.fillStyle = PAL.cyan;
  ctx.fillRect(W-180, 70, 160 * dashPct, 5);

  // ── DEBUGGER PROXIMITY (top right, below abilities)
  const dotX = W-20, dotY = 108;
  const dotCol = scanning ? PAL.red : (prox>0.4 ? PAL.neonA : PAL.redDim);
  const dotPulse = Math.sin(frame*(0.06+prox*0.2))>0;
  if (dotPulse||scanning) {
    glow(dotCol, 18);
    ctx.fillStyle = dotCol;
    ctx.beginPath(); ctx.arc(dotX-5, dotY, 6+prox*4, 0, Math.PI*2); ctx.fill();
    noGlow();
  } else {
    ctx.fillStyle = '#2a0000';
    ctx.beginPath(); ctx.arc(dotX-5, dotY, 6, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = prox>0.3?PAL.red:PAL.redDim;
  ctx.font = '9px Courier New';
  ctx.fillText(`${debuggers.length} DBG`, W-20, 123);

  if (goalToastTimer > 0) {
    ctx.textAlign = 'center';
    ctx.globalAlpha = Math.min(1, goalToastTimer / 50);
    glow(PAL.yellow, 14);
    ctx.fillStyle = PAL.yellow;
    ctx.font = 'bold 11px Courier New';
    ctx.fillText(goalToast, W/2, 58);
    noGlow();
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  if (warpState.active) {
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.purple;
    ctx.font = '11px Courier New';
    ctx.globalAlpha = 0.8;
    ctx.fillText(`WARP ACTIVE  [R] RETURN  ${Math.ceil(warpState.timer/60)}s`, W/2, H-28);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // ── DEBUGGER COUNT ESCALATION warning
  if (tutorialCompleted && corruption > 200 && !dangerMode) {
    const dbgLevel = getDebuggerCount();
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.redDim;
    ctx.font = '9px Courier New';
    ctx.globalAlpha = 0.55;
    ctx.fillText(`THREAT LEVEL ${dbgLevel} • DEBUGGERS ${debuggers.length}/${dbgLevel}`, W/2, H-15);
    ctx.globalAlpha = 1;
  }

  // ── VIGNETTE based on proximity
  const vig = ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
  const vigStr = 0.45 + prox*0.3;
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,`rgba(${scanning?'35,0,0':prox>0.4?'25,0,5':'5,0,15'},${vigStr})`);
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  ctx.textAlign='left';

  // ── GLITCH OVERLAY (suppressed during danger for readability)
  if (glitchIntensity>0 && !dangerMode) {
    ctx.save();
    const bars = Math.floor(glitchIntensity*8);
    for (let i=0;i<bars;i++) {
      if (Math.random()<0.35) {
        ctx.globalAlpha=Math.random()*0.28;
        ctx.fillStyle=Math.random()<0.5?PAL.red:PAL.cyan;
        const gy2=Math.random()*H, gh=1+Math.random()*7;
        ctx.fillRect((Math.random()-0.5)*25, gy2, W+25, gh);
      }
    }
    ctx.restore();
    glitchIntensity *= 0.91;
  }

  // ── TIPS TICKER (bottom center, sliding)
  if (tutorialCompleted && !dangerMode) {
    if (!isPaused) tipTimer++;
    const TIP_DURATION = 280;
    const SLIDE_FRAMES = 30;
    const tipPhase = tipTimer % TIP_DURATION;

    if (tipPhase === 0) currentTip = (currentTip+1) % TIPS.length;

    const tip = TIPS[currentTip];
    let alpha = 1;
    if (tipPhase < SLIDE_FRAMES) alpha = tipPhase/SLIDE_FRAMES;
    else if (tipPhase > TIP_DURATION-SLIDE_FRAMES) alpha = (TIP_DURATION-tipPhase)/SLIDE_FRAMES;

    const tipY = H - 52 + (1-alpha)*20;
    ctx.save();
    ctx.globalAlpha = alpha * 0.9;
    // Background strip
    ctx.fillStyle = '#05000f';
    ctx.fillRect(W/2-280, tipY-18, 560, 32);
    ctx.strokeStyle = PAL.purple;
    ctx.lineWidth = 1;
    ctx.strokeRect(W/2-280, tipY-18, 560, 32);
    // Corner brackets
    ctx.strokeStyle = PAL.yellow;
    ctx.lineWidth = 1.5;
    const bw=8;
    [[W/2-280,tipY-18],[W/2+280-bw,tipY-18],[W/2-280,tipY+14-bw],[W/2+280-bw,tipY+14-bw]].forEach(([tx,ty])=>{
      ctx.strokeRect(tx, ty, bw, bw);
    });
    ctx.textAlign='center';
    ctx.fillStyle = PAL.yellow;
    ctx.font = 'bold 10px Courier New';
    ctx.fillText(`◈ ${tip.title}`, W/2, tipY-3);
    ctx.fillStyle = PAL.white;
    ctx.font = '10px Courier New';
    ctx.globalAlpha = alpha * 0.75;
    ctx.fillText(tip.text, W/2, tipY+11);
    ctx.restore();
  }

  ctx.restore();
}

function drawPauseButton() {
  if (gameState === 'loading' || gameState === 'gameover') return;

  const bw = 96;
  const bh = 28;
  const bx = W - bw - 18;
  const by = 102;
  pauseButtonRect.x = bx;
  pauseButtonRect.y = by;
  pauseButtonRect.w = bw;
  pauseButtonRect.h = bh;

  ctx.save();
  glow(PAL.cyan, 10);
  ctx.fillStyle = isPaused ? '#102020' : '#081018';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = PAL.cyan;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bx, by, bw, bh);
  noGlow();

  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.cyan;
  ctx.font = 'bold 11px Courier New';
  ctx.fillText(isPaused ? 'RESUME' : 'PAUSE', bx + bw / 2, by + 18);
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawPauseOverlay() {
  if (!isPaused) return;

  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
  ctx.fillRect(0, 0, W, H);

  glow(PAL.cyan, 24);
  ctx.fillStyle = PAL.cyan;
  ctx.textAlign = 'center';
  ctx.font = 'bold 42px Courier New';
  ctx.fillText('PAUSED', W / 2, H / 2 - 10);
  noGlow();

  ctx.fillStyle = PAL.greyLight;
  ctx.font = '12px Courier New';
  ctx.fillText('Press [P] / [ESC] or click PAUSE to resume', W / 2, H / 2 + 20);
  ctx.textAlign = 'left';
  ctx.restore();
}
